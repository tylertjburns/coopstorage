# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python package

on:
  push:
    branches: [ "master" ]
    paths:
      - 'coopstorage/**'
      - 'tests/**'
      - 'setup.py'
      - 'requirements.txt'
  pull_request:
    branches: [ "master" ]
    paths:
      - 'coopstorage/**'
      - 'tests/**'
      - 'setup.py'
      - 'requirements.txt'

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        python -m pip install flake8 pytest
        grep -v "^coopmongo" requirements.txt | pip install -r /dev/stdin
        pip install --no-deps coopmongo
        pip install --no-deps -e .
    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude venv,docs,build
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics --exclude venv,docs,build
    - name: Functional tests
      run: |
        pytest tests/ --ignore=tests/test_storage_benchmark.py

  publish:
    needs: validate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"
    - name: Install build tools
      run: |
        python -m pip install --upgrade pip
        pip install build twine
    - name: Increment version
      id: version
      run: |
        python3 << 'PYEOF'
        import re, os
        content = open('setup.py').read()
        match = re.search(r"version='(\d+)\.(\d+)'", content)
        major, minor = int(match.group(1)), int(match.group(2))
        new_version = f'{major}.{minor + 1}'
        open('setup.py', 'w').write(content.replace(f"version='{major}.{minor}'", f"version='{new_version}'"))
        with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
            f.write(f'new_version={new_version}\n')
        PYEOF
    - name: Build package
      run: python -m build
    - name: Publish to PyPI
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      run: twine upload dist/*
    - name: Commit and tag version bump
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add setup.py
        git commit -m "chore: bump version to ${{ steps.version.outputs.new_version }} [skip ci]"
        git tag "v${{ steps.version.outputs.new_version }}"
        git push origin master --tags

  docker:
    needs: publish
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
    - uses: actions/checkout@v4
      with:
        ref: master
    - name: Extract version
      id: version
      run: |
        python3 << 'PYEOF'
        import re, os
        content = open('setup.py').read()
        match = re.search(r"version='(\d+\.\d+)'", content)
        with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
            f.write(f'version={match.group(1)}\n')
        PYEOF
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: |
          tylertjburns/coopstorage:${{ steps.version.outputs.version }}
          tylertjburns/coopstorage:latest

  benchmark:
    needs: docker
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        python -m pip install pytest
        grep -v "^coopmongo" requirements.txt | pip install -r /dev/stdin
        pip install --no-deps coopmongo
        pip install --no-deps -e .
    - name: Run performance benchmarks
      run: |
        pytest tests/test_storage_benchmark.py -v --tb=short 2>&1 | tee benchmark_results.txt
    - name: Write benchmark summary
      if: always()
      run: |
        echo "## Benchmark Results" >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
        cat benchmark_results.txt >> $GITHUB_STEP_SUMMARY
        echo '```' >> $GITHUB_STEP_SUMMARY
    - name: Upload benchmark results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: benchmark-results
        path: benchmark_results.txt
        retention-days: 90
