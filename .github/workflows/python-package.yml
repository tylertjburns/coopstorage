# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python package

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install flake8 pytest
        pip install -r requirements.txt
        pip install --no-deps -e .
    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude venv,docs,build
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics --exclude venv,docs,build
    - name: Test with pytest
      run: |
        pytest tests/

  publish:

    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"
    - name: Install build tools
      run: |
        python -m pip install --upgrade pip
        pip install build twine
    - name: Increment version
      id: version
      run: |
        python3 << 'PYEOF'
        import re, os
        content = open('setup.py').read()
        match = re.search(r"version='(\d+)\.(\d+)'", content)
        major, minor = int(match.group(1)), int(match.group(2))
        new_version = f'{major}.{minor + 1}'
        open('setup.py', 'w').write(content.replace(f"version='{major}.{minor}'", f"version='{new_version}'"))
        with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
            f.write(f'new_version={new_version}\n')
        PYEOF
    - name: Build package
      run: python -m build
    - name: Publish to PyPI
      env:
        TWINE_USERNAME: __token__
        TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
      run: twine upload dist/*
    - name: Commit and tag version bump
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add setup.py
        git commit -m "chore: bump version to ${{ steps.version.outputs.new_version }} [skip ci]"
        git tag "v${{ steps.version.outputs.new_version }}"
        git push origin master --tags

  docker:

    needs: publish
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
    - uses: actions/checkout@v4
      with:
        ref: master
    - name: Extract version
      id: version
      run: |
        python3 << 'PYEOF'
        import re, os
        content = open('setup.py').read()
        match = re.search(r"version='(\d+\.\d+)'", content)
        with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
            f.write(f'version={match.group(1)}\n')
        PYEOF
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: |
          tylertjburns/coopstorage:${{ steps.version.outputs.version }}
          tylertjburns/coopstorage:latest
