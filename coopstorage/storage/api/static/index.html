<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CoopStorage Visualizer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d1117; color: #c9d1d9; font-family: monospace; overflow: hidden; }

    #canvas { display: block; cursor: grab; }
    #canvas.dragging { cursor: grabbing; }

    #hud {
      position: fixed; top: 12px; left: 12px;
      display: flex; gap: 8px; align-items: center; pointer-events: all;
    }
    .btn {
      background: #21262d; border: 1px solid #30363d; color: #c9d1d9;
      padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 12px;
      font-family: monospace; transition: background 0.1s;
    }
    .btn:hover { background: #30363d; }
    .btn.active { background: #1f6feb; border-color: #388bfd; }

    #hint { font-size: 11px; color: #484f58; margin-left: 6px; }

    .btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-danger  { border-color: #f85149; color: #f85149; }
    .btn-danger:hover:not(:disabled) { background: #3d1a1a; }
    .btn-sim     { border-color: #3fb950; color: #3fb950; }
    .btn-sim:hover:not(:disabled) { background: #0f2e0f; }
    .btn-stop    { border-color: #d29922; color: #d29922; }
    .btn-stop:hover:not(:disabled) { background: #2e1f00; }

    #confirm-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.6); z-index: 100;
      align-items: center; justify-content: center;
    }
    #confirm-overlay.visible { display: flex; }
    #confirm-box {
      background: #161b22; border: 1px solid #30363d; border-radius: 8px;
      padding: 24px 28px; min-width: 320px; font-family: monospace;
    }
    #confirm-box h3 { color: #e6edf3; margin-bottom: 10px; font-size: 13px; }
    #confirm-box p  { color: #8b949e; font-size: 11px; margin-bottom: 14px; line-height: 1.6; }
    #confirm-input {
      width: 100%; background: #0d1117; border: 1px solid #30363d;
      color: #c9d1d9; border-radius: 4px; padding: 6px 10px;
      font-family: monospace; font-size: 12px; margin-bottom: 14px;
    }
    #confirm-input:focus { outline: none; border-color: #58a6ff; }
    #confirm-buttons { display: flex; gap: 8px; justify-content: flex-end; }
    #sim-status { font-size: 11px; color: #8b949e; margin-left: 4px; }

    /* ── Simulation config dialog ────────────────────────────────────────────── */
    #sim-dialog-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.6); z-index: 100;
      align-items: center; justify-content: center;
    }
    #sim-dialog-overlay.visible { display: flex; }
    #sim-dialog-box {
      background: #161b22; border: 1px solid #30363d; border-radius: 8px;
      padding: 22px 26px; width: 340px; font-family: monospace;
    }
    #sim-dialog-box h3 { color: #e6edf3; font-size: 13px; margin-bottom: 16px; }
    .sim-field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
    .sim-field label { font-size: 10px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.05em; }
    .sim-field input, .sim-field select {
      background: #0d1117; border: 1px solid #30363d; color: #c9d1d9;
      border-radius: 4px; padding: 5px 8px; font-family: monospace; font-size: 12px;
    }
    .sim-field input:focus, .sim-field select:focus { outline: none; border-color: #58a6ff; }
    .sim-row { display: flex; gap: 10px; }
    .sim-row .sim-field { flex: 1; }
    #sim-dialog-buttons { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }

    #status {
      position: fixed; bottom: 12px; left: 12px;
      font-size: 11px; color: #8b949e;
    }

    #tooltip {
      position: fixed; display: none;
      background: #161b22; border: 1px solid #30363d; border-radius: 6px;
      padding: 10px 14px; font-size: 11px; pointer-events: none;
      max-width: 300px; line-height: 1.7; z-index: 10;
    }
    #tooltip strong { color: #e6edf3; }
    #tooltip em { color: #58a6ff; font-style: normal; }

    #legend {
      position: fixed; bottom: 12px; right: 12px;
      background: #161b22; border: 1px solid #30363d; border-radius: 6px;
      padding: 8px 12px; font-size: 11px; line-height: 2; pointer-events: none;
    }
    .legend-row { display: flex; align-items: center; gap: 8px; }
    .legend-swatch {
      width: 14px; height: 14px; border-radius: 2px; flex-shrink: 0;
    }

    #uom-legend {
      position: fixed; bottom: 12px; right: 180px;
      background: #161b22; border: 1px solid #30363d; border-radius: 6px;
      padding: 8px 12px; font-size: 11px; line-height: 2; pointer-events: none;
      display: none;
    }
    #uom-legend-title { color: #8b949e; margin-bottom: 2px; font-size: 10px; }
    .uom-legend-row { display: flex; align-items: center; gap: 6px; }
    .uom-icon { font-size: 13px; width: 18px; text-align: center; }

    /* ── Viz config panel ────────────────────────────────────────────────────── */
    #viz-dialog-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.6); z-index: 100;
      align-items: center; justify-content: center;
    }
    #viz-dialog-overlay.visible { display: flex; }
    #viz-dialog-box {
      background: #161b22; border: 1px solid #30363d; border-radius: 8px;
      padding: 22px 26px; width: 520px; max-height: 90vh; overflow-y: auto;
      font-family: monospace;
    }
    #viz-dialog-box h3 { color: #e6edf3; font-size: 13px; margin-bottom: 16px; }
    .viz-field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
    .viz-field label { font-size: 10px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.05em; }
    .viz-field input, .viz-field select {
      background: #0d1117; border: 1px solid #30363d; color: #c9d1d9;
      border-radius: 4px; padding: 5px 8px; font-family: monospace; font-size: 12px;
    }
    .viz-field input[type="checkbox"] {
      width: 16px; height: 16px; padding: 0; cursor: pointer; align-self: flex-start;
    }
    .viz-field input:focus, .viz-field select:focus { outline: none; border-color: #58a6ff; }
    .viz-row { display: flex; gap: 10px; }
    .viz-row .viz-field { flex: 1; }
    #viz-dialog-buttons { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
    .viz-tier-section {
      border: 1px solid #21262d; border-radius: 6px; padding: 12px 14px; margin-bottom: 12px;
    }
    .viz-tier-header {
      font-size: 11px; color: #58a6ff; font-weight: bold; margin-bottom: 10px;
      display: flex; align-items: center; gap: 8px;
    }
    .viz-tier-header span { color: #8b949e; font-weight: normal; font-size: 10px; }
    .viz-tier-header input[type="number"] {
      background: #0d1117; border: 1px solid #30363d; color: #c9d1d9;
      border-radius: 3px; padding: 2px 5px; font-family: monospace; font-size: 11px;
      width: 52px; text-align: center;
    }
    .viz-wf-checks { display: flex; gap: 8px; flex-wrap: wrap; }
    .viz-wf-checks label {
      font-size: 11px; color: #c9d1d9; display: flex; align-items: center; gap: 4px;
      cursor: pointer; text-transform: none; letter-spacing: 0;
    }
    .viz-wf-checks input[type="checkbox"] {
      width: 13px; height: 13px; padding: 0; margin: 0; cursor: pointer;
    }
  </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="hud">
  <button class="btn active" id="btn-iso">Isometric</button>
  <button class="btn"        id="btn-2d">Top-down</button>
  <button class="btn"        id="btn-fit">Fit view</button>
  <span style="width:1px;background:#30363d;height:20px;display:inline-block;margin:0 4px;"></span>
  <button class="btn btn-sim"  id="btn-sim-start">▶ Start Sim</button>
  <button class="btn btn-stop" id="btn-sim-stop" disabled>■ Stop Sim</button>
  <span id="sim-status"></span>
  <span style="width:1px;background:#30363d;height:20px;display:inline-block;margin:0 4px;"></span>
  <button class="btn btn-danger" id="btn-clear-loads">Clear Loads</button>
  <button class="btn btn-danger" id="btn-clear-locs">Clear Locations</button>
  <span style="width:1px;background:#30363d;height:20px;display:inline-block;margin:0 4px;"></span>
  <button class="btn" id="btn-viz-config">⚙ Viz</button>

</div>

<div id="confirm-overlay">

    </div>
    <div class="sim-row">

        <label>Min fill (0–1)</label>
        <input id="sim-min-fill" type="number" min="0" max="1" step="0.05" value="0.15" />
      </div>

        <label>Max fill (0–1)</label>

    </div>
    <div id="sim-weights-section">
      <div class="sim-row">
        <div class="sim-field">
          <label>Add weight</label>

        <div class="sim-field">
          <label>Move weight</label>
          <input id="sim-move-weight" type="number" min="0" step="0.05" value="0.40" />

        <div class="sim-field">

    <div id="sim-dialog-buttons">

</div>

    <h3>Visualization Config</h3>

    <div class="viz-row">

        <label>Show location IDs</label>

    <!-- Low zoom tier -->

      </div>

          <label><input type="checkbox" class="viz-wf-low" value="aisle" checked> aisle</label>
          <label><input type="checkbox" class="viz-wf-low" value="row"> row</label>

          <label><input type="checkbox" class="viz-wf-low" value="shelf"> shelf</label>
        </div>
      </div>
      <div class="viz-row">
        <div class="viz-field">
          <label>Hover level</label>
          <select id="viz-hover-level-low">
            <option value="">None</option>
            <option value="zone">Zone</option>
            <option value="aisle" selected>Aisle</option>
            <option value="row">Row</option>
            <option value="bay">Bay</option>
            <option value="shelf">Shelf</option>
          </select>
        </div>
        <div class="viz-field">
          <label>Hover detail</label>
          <select id="viz-hover-detail-low">
            <option value="none">None</option>
            <option value="dots" selected>Dots</option>
            <option value="tiles">Tiles</option>
          </select>
        </div>
        <div class="viz-field">
          <label>Loc display</label>
          <select id="viz-locs-low">
            <option value="none" selected>None</option>
            <option value="dots">Dots</option>
            <option value="grey">Grey tiles</option>
          </select>
        </div>
      </div>
      <div class="viz-field" id="viz-wf-hover-row-low">
        <label>Hover wireframe level</label>
        <select id="viz-wf-hover-level-low">
          <option value="">None</option>
          <option value="zone">Zone</option>
          <option value="aisle">Aisle</option>
          <option value="row" selected>Row</option>
          <option value="bay">Bay</option>
          <option value="shelf">Shelf</option>
        </select>
      </div>
    </div>

    <!-- Mid zoom tier -->
    <div class="viz-tier-section">
      <div class="viz-tier-header">
        Mid zoom
        <span>scale &lt; <input id="viz-lod-high" type="number" min="0.5" max="200" step="0.5" value="4" /></span>
      </div>

        <label>Wireframes</label>
        <div class="viz-wf-checks">
          <label><input type="checkbox" class="viz-wf-mid" value="zone"> zone</label>
          <label><input type="checkbox" class="viz-wf-mid" value="aisle" checked> aisle</label>
          <label><input type="checkbox" class="viz-wf-mid" value="row"> row</label>

          <label><input type="checkbox" class="viz-wf-mid" value="shelf"> shelf</label>

            <option value="zone">Zone</option>
            <option value="aisle">Aisle</option>

            <option value="bay">Bay</option>

        </div>

          <label>Hover detail</label>

          <label><input type="checkbox" class="viz-wf-high" value="bay" checked> bay</label>
          <label><input type="checkbox" class="viz-wf-high" value="shelf"> shelf</label>
        </div>
      </div>
      <div class="viz-row">
        <div class="viz-field">
          <label>Hover level</label>
          <select id="viz-hover-level-high">
            <option value="">None</option>
            <option value="zone">Zone</option>
            <option value="aisle">Aisle</option>
            <option value="row">Row</option>
            <option value="bay" selected>Bay</option>
            <option value="shelf">Shelf</option>
          </select>

        <div class="viz-field">

<div id="tooltip"></div>

    <span>Reserved (container)</span>
  </div>
  <div class="legend-row">
    <div class="legend-swatch" style="background:#1c2128; border:2px solid #e3b341;"></div>
    <span>Reserved (location)</span>

</div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
// locations: id → { id, coords:[x,y,z], meta:{dims,channel_processor,capacity,...},
//                   slots:[id|null,...], containers:{id→{id,uom,contents}},
//                   tree_path:{zone,aisle,...} }
const locations  = new Map();
const containers = new Map();   // flat container registry

// ─── Viz config ───────────────────────────────────────────────────────────────
// Three zoom tiers. lodMidThreshold separates low from mid; lodHighThreshold separates mid from high.
const vizConfig = {
  lodMidThreshold:  1.25,  // scale: below → low tier
  lodHighThreshold: 4,     // scale: above → high tier (between the two = mid)
  showLocIds:       false,
  tiers: {
    low: {
      wireframeLevels:     ['zone', 'aisle'],
      hoverLevel:          'aisle',
      hoverDetail:         'dots',
      hoverWireframeLevel: 'row',
      locsDisplay:         'none',
    },
    mid: {
      wireframeLevels:     ['aisle'],
      hoverLevel:          'row',
      hoverDetail:         'dots',
      hoverWireframeLevel: 'bay',
      locsDisplay:         'dots',
    },
    high: {
      wireframeLevels:     ['row', 'bay'],
      hoverLevel:          'bay',
      hoverDetail:         'tiles',
      hoverWireframeLevel: 'aisle',
      locsDisplay:         'grey',
    },
  },
};

// ─── Reservation state ────────────────────────────────────────────────────────
const AMBER           = '#e3b341';
const AMBER_FILL      = 'rgba(61,46,0,0.85)';
const reservedContainerIds = new Set();  // container IDs with active reservations
const reservedLocationIds  = new Set();  // location IDs with active reservations

// ─── Group index ──────────────────────────────────────────────────────────────
// wireframeIndices: Map<level, Map<key, Set<locId>>>  — one index per wireframe level in use
// hoverIndices:     Map<level, Map<key, Set<locId>>>  — one index per hover level in use
// groupBoxCache:    key → bounding box (invalidated on loc registration)
const wireframeIndices = new Map();
const hoverIndices     = new Map();
const groupBoxCache    = new Map();

function _activeTier() {
  if (scale >= vizConfig.lodHighThreshold) return 'high';
  if (scale >= vizConfig.lodMidThreshold)  return 'mid';
  return 'low';
}
function _activeTierConfig() { return vizConfig.tiers[_activeTier()]; }

let   hoveredAisleKey = null;   // key into the active hover index for the hovered group
let   hoveredLocId    = null;

function _groupKey(loc, level) {
  if (!level) return null;
  const tp = loc.tree_path;
  if (!tp) return null;
  // Build a key from all tree path values up to and including the target level.
  // Requires zone to always be present as root.
  const knownLevels = ['zone', 'aisle', 'row', 'bay', 'shelf', 'loc'];
  const idx = knownLevels.indexOf(level);
  if (idx < 0) return null;
  const parts = [];
  for (let i = 0; i <= idx; i++) {
    const l = knownLevels[i];
    if (tp[l] === undefined) return null;
    parts.push(`${l[0]}${tp[l]}`);
  }
  return parts.join('_');
}

function _uniqueLevels(indexMap) {
  // Collect all unique levels referenced across all tiers for a given Map (wireframe or hover).
  const levels = new Set();
  for (const tc of Object.values(vizConfig.tiers)) {
    if (indexMap === wireframeIndices) {
      for (const l of tc.wireframeLevels) if (l) levels.add(l);
      // hoverWireframeLevel entries also need a wireframe index so they can be drawn on hover
      if (tc.hoverWireframeLevel) levels.add(tc.hoverWireframeLevel);
    } else {
      if (tc.hoverLevel) levels.add(tc.hoverLevel);
    }
  }
  return levels;
}

function _buildGroupIndex(level, index) {
  index.clear();
  for (const loc of locations.values()) {
    const key = _groupKey(loc, level);
    if (!key) continue;
    if (!index.has(key)) index.set(key, new Set());
    index.get(key).add(loc.id);
  }
}

function _rebuildIndices() {
  wireframeIndices.clear();
  hoverIndices.clear();
  for (const level of _uniqueLevels(wireframeIndices)) {
    const idx = new Map();
    _buildGroupIndex(level, idx);
    wireframeIndices.set(level, idx);
  }
  for (const level of _uniqueLevels(hoverIndices)) {
    const idx = new Map();
    _buildGroupIndex(level, idx);
    hoverIndices.set(level, idx);
  }
  groupBoxCache.clear();
  tileCache.clear();
  hoveredAisleKey = null;
  _markBgDirty();
  _rebuildHitGrid();
}

function _indexLoc(loc) {
  for (const [level, idx] of wireframeIndices) {
    const key = _groupKey(loc, level);
    if (!key) continue;
    if (!idx.has(key)) idx.set(key, new Set());
    idx.get(key).add(loc.id);
    groupBoxCache.delete(key);
  }
  for (const [level, idx] of hoverIndices) {
    const key = _groupKey(loc, level);
    if (!key) continue;
    if (!idx.has(key)) idx.set(key, new Set());
    idx.get(key).add(loc.id);
    groupBoxCache.delete(key);
  }
}

function _groupBox(key, index) {
  if (groupBoxCache.has(key)) return groupBoxCache.get(key);
  const ids = index.get(key);
  if (!ids) return null;
  let minX = Infinity, minY = Infinity, minZ = Infinity;
  let maxX = -Infinity, maxY = -Infinity, maxZ = -Infinity;
  for (const id of ids) {
    const loc = locations.get(id);
    if (!loc) continue;
    const [wx, wy, wz] = loc.coords;
    const [dx, dy, dz] = loc.meta.dims;
    minX = Math.min(minX, wx);      maxX = Math.max(maxX, wx + dx);
    minY = Math.min(minY, wy);      maxY = Math.max(maxY, wy + dy);
    minZ = Math.min(minZ, wz);      maxZ = Math.max(maxZ, wz + dz);
  }
  const box = { minX, minY, minZ, maxX, maxY, maxZ };
  groupBoxCache.set(key, box);
  return box;
}

function _groupOccupancyPct(key, index) {
  const ids = index.get(key);
  if (!ids) return 0;
  let used = 0, cap = 0;
  for (const id of ids) {
    const loc = locations.get(id);
    if (!loc) continue;
    cap  += loc.slots.length;
    used += loc.slots.filter(s => s !== null).length;
  }
  return cap > 0 ? used / cap : 0;
}

function _drawGroupWireframe(key, index, level) {
  const box = _groupBox(key, index);
  if (!box) return;
  const pct = _groupOccupancyPct(key, index);
  const ids = index.get(key);
  // Interpolate between empty (#444c56) and occupied (#3fb950) to match slot colors
  const r = Math.round(0x44 + pct * (0x3f - 0x44));
  const g = Math.round(0x4c + pct * (0xb9 - 0x4c));
  const b = Math.round(0x56 + pct * (0x50 - 0x56));
  const stroke = `rgb(${r},${g},${b})`;

  if (isIso) {
    const p = (x, y, z) => project(x, y, z);
    const { minX: x0, minY: y0, minZ: z0, maxX: x1, maxY: y1, maxZ: z1 } = box;
    // Draw three visible wireframe edges (left, right, top faces) of the bounding cube
    const edges = [
      // bottom rect
      [p(x0,y0,z0), p(x1,y0,z0)], [p(x1,y0,z0), p(x1,y1,z0)],
      [p(x1,y1,z0), p(x0,y1,z0)], [p(x0,y1,z0), p(x0,y0,z0)],
      // top rect
      [p(x0,y0,z1), p(x1,y0,z1)], [p(x1,y0,z1), p(x1,y1,z1)],
      [p(x1,y1,z1), p(x0,y1,z1)], [p(x0,y1,z1), p(x0,y0,z1)],
      // verticals
      [p(x0,y0,z0), p(x0,y0,z1)], [p(x1,y0,z0), p(x1,y0,z1)],
      [p(x1,y1,z0), p(x1,y1,z1)], [p(x0,y1,z0), p(x0,y1,z1)],
    ];
    ctx.strokeStyle = stroke;
    ctx.lineWidth   = 1;
    for (const [a, b] of edges) {
      ctx.beginPath();
      ctx.moveTo(a[0], a[1]);
      ctx.lineTo(b[0], b[1]);
      ctx.stroke();
    }
  } else {
    const [sx0, sy0] = project(box.minX, box.minY, 0);
    const [sx1, sy1] = project(box.maxX, box.maxY, 0);
    ctx.strokeStyle = stroke;
    ctx.lineWidth   = 1;
    ctx.strokeRect(sx0, sy0, sx1 - sx0, sy1 - sy0);
  }

  // Label: show the value of the configured level
  const [lx, ly] = isIso
    ? project((box.minX + box.maxX) / 2, box.minY, box.maxZ)
    : project((box.minX + box.maxX) / 2, (box.minY + box.maxY) / 2, 0);
  const sample = ids ? locations.get([...ids][0]) : null;
  if (sample && sample.tree_path) {
    const tp    = sample.tree_path;
    const val = tp[level] !== undefined ? tp[level] : key;
    ctx.fillStyle    = stroke;
    ctx.font         = '11px monospace';
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillText(`${level[0].toUpperCase()}${val}`, lx, ly);
  }
}

// ─── UOM icon system ──────────────────────────────────────────────────────────
// Pool of distinct unicode symbols assigned deterministically per UOM name.
const UOM_ICON_POOL = ['■','▲','●','◆','★','▼','⬟','⬡','⬢','⬣','⬤','⬥','⬦',
                       '⬧','⬨','⬩','⬪','⬫','⬬','⬭','⬮','⬯'];
const uomIconMap = new Map();   // uom name → icon string

function _uomIcon(uomName) {
  if (!uomIconMap.has(uomName)) {
    const icon = UOM_ICON_POOL[uomIconMap.size % UOM_ICON_POOL.length];
    uomIconMap.set(uomName, icon);
    _refreshUomLegend();
  }
  return uomIconMap.get(uomName);
}

function _refreshUomLegend() {
  const el = document.getElementById('uom-legend');
  if (uomIconMap.size === 0) { el.style.display = 'none'; return; }
  el.style.display = 'block';
  // Rebuild rows after title
  const title = document.getElementById('uom-legend-title');
  el.innerHTML = '';
  el.appendChild(title);
  for (const [name, icon] of uomIconMap) {
    const row = document.createElement('div');
    row.className = 'uom-legend-row';
    row.innerHTML = `<span class="uom-icon">${icon}</span><span>${name}</span>`;
    el.appendChild(row);
  }
}

// ─── Tile cache ───────────────────────────────────────────────────────────────
// Each location's 3D detail is rendered once into an OffscreenCanvas and blitted
// each frame. A tile is invalidated when slot state, addable/removable positions,
// or the view mode changes. During zoom gestures we skip the cache entirely to
// avoid rebuilding stale tiles on every frame.
const TILE_CACHE_MAX = 500;
const tileCache = new Map();  // loc.id → { key, canvas, relOx, relOy }  (LRU — capped at TILE_CACHE_MAX)

function _tileCacheSet(id, tile) {
  if (tileCache.has(id)) tileCache.delete(id);       // refresh insertion order
  tileCache.set(id, tile);
  if (tileCache.size > TILE_CACHE_MAX) {
    tileCache.delete(tileCache.keys().next().value);  // evict oldest
  }
}

function _tileCacheGet(id) {
  if (!tileCache.has(id)) return undefined;
  const tile = tileCache.get(id);
  tileCache.delete(id); tileCache.set(id, tile);     // refresh insertion order
  return tile;
}
let   zooming   = false;
let   panning   = false;
let   _zoomTimer = null;
let   _panTimer  = null;

function _locStateKey(loc) {
  // Encodes only content state — slot occupancy, channel access, and view mode.
  // Scale is intentionally excluded: tileCache.clear() on zoom settle handles
  // scale invalidation, so including it here would cause pre-warmed tiles to
  // always miss when the user zooms in from fit-view scale.
  const slots = loc.slots.join(',');
  const add   = (loc.addable_slots   || []).join(',');
  const rem   = (loc.removable_slots || []).join(',');
  const view  = isIso ? 'i' : '2';
  return `${view}|${slots}|${add}|${rem}`;
}

// Build an OffscreenCanvas for loc, render the detail onto it.
// Offsets are stored relative to the location's own projected screen position
// so that panning (which shifts all projected points equally) never invalidates tiles.
function _buildTile(loc) {
  const [wx, wy, wz] = loc.coords;
  const [dx, dy, dz] = loc.meta.dims;

  // Project with pan=0 so offsets are pan-independent.
  const savedPanX = panX, savedPanY = panY;
  panX = 0; panY = 0;

  const corners = [
    [wx,    wy,    wz],    [wx+dx, wy,    wz],
    [wx,    wy+dy, wz],    [wx+dx, wy+dy, wz],
    [wx,    wy,    wz+dz], [wx+dx, wy,    wz+dz],
    [wx,    wy+dy, wz+dz], [wx+dx, wy+dy, wz+dz],
  ];
  const spts = corners.map(c => project(...c));
  const margin = Math.max(60, scale * 4);
  const minSx = Math.min(...spts.map(p => p[0])) - margin;
  const minSy = Math.min(...spts.map(p => p[1])) - margin;
  const maxSx = Math.max(...spts.map(p => p[0])) + margin;
  const maxSy = Math.max(...spts.map(p => p[1])) + margin;

  // Anchor: location centre in pan=0 space
  const [ancX, ancY] = project(...loc.coords);
  // relO* = offset from projected centre to tile top-left (pan-independent)
  const relOx = minSx - ancX;
  const relOy = minSy - ancY;

  panX = savedPanX; panY = savedPanY;

  const tw = Math.ceil(maxSx - minSx);
  const th = Math.ceil(maxSy - minSy);
  if (tw <= 0 || th <= 0) return null;

  const osc  = new OffscreenCanvas(tw, th);
  const octx = osc.getContext('2d');

  // Redirect draw calls to offscreen canvas, shift origin to tile top-left.
  const savedCtx = ctx;
  ctx  = octx;   // eslint-disable-line no-global-assign
  panX = -minSx;
  panY = -minSy;

  _drawDetail3D(loc);

  panX = savedPanX;
  panY = savedPanY;
  ctx  = savedCtx;  // eslint-disable-line no-global-assign

  return { key: _locStateKey(loc), canvas: osc, relOx, relOy };
}

function _getTile(loc) {
  const key    = _locStateKey(loc);
  const cached = _tileCacheGet(loc.id);
  if (cached && cached.key === key) return cached;
  const tile = _buildTile(loc);
  if (tile) _tileCacheSet(loc.id, tile);
  return tile;
}

function _onZoom() {
  zooming = true;
  clearTimeout(_zoomTimer);
  _zoomTimer = setTimeout(() => {
    zooming = false;
    tileCache.clear();   // force rebuild at new scale
    _markBgDirty();
    _rebuildHitGrid();
    // If hovered key no longer exists in the active tier's hover index, clear it
    const tc      = _activeTierConfig();
    const hoverIdx = hoverIndices.get(tc.hoverLevel);
    if (hoveredAisleKey && (!hoverIdx || !hoverIdx.has(hoveredAisleKey))) {
      hoveredAisleKey = null;
    }
    forceRender();
    // Pre-warm tiles at the new scale (only for hover-detail=tiles tier, grey uses direct draw)
    if (tc.hoverDetail === 'tiles') {
      _prewarmTiles([...locations.values()]);
    }
  }, 50);
}

// ─── Background layer cache ───────────────────────────────────────────────────
// Wireframes + all-locs (locsDisplay) painted once into an OffscreenCanvas.
// Blitted in one drawImage call per frame; only rebuilt when viewport or data changes.
// Hover overlay (the changing part) is drawn on top each frame.
let _bgCanvas = null;
let _bgDirty  = true;

function _markBgDirty() { _bgDirty = true; }

function _ensureBgCanvas() {
  if (!_bgCanvas || _bgCanvas.width !== W || _bgCanvas.height !== H) {
    _bgCanvas = new OffscreenCanvas(W, H);
    _bgDirty  = true;
  }
}

function _paintBackground(tc) {
  _ensureBgCanvas();
  if (!_bgDirty) return;
  _bgDirty = false;

  // Redirect all draw calls to the offscreen canvas
  const savedCtx = ctx;
  ctx = _bgCanvas.getContext('2d');   // eslint-disable-line no-global-assign

  ctx.clearRect(0, 0, W, H);

  // Wireframes
  for (const level of tc.wireframeLevels) {
    const idx = wireframeIndices.get(level);
    if (idx) for (const [key] of idx) _drawGroupWireframe(key, idx, level);
  }

  // All locs using locsDisplay (no hover distinction — hover drawn on top)
  if (tc.locsDisplay !== 'none') {
    const r = Math.max(1.5, scale * 0.6);
    const dotsEmpty = [], dotsOccupied = [], dotsReserved = [];
    for (const loc of locations.values()) {
      const [sx, sy] = project(...loc.coords);
      if (sx < -300 || sx > W + 300 || sy < -300 || sy > H + 300) continue;
      if (tc.locsDisplay === 'dots') {
        const locReserved = reservedLocationIds.has(String(loc.id));
        const hasReservedContainer = loc.slots.some(s => s !== null && reservedContainerIds.has(String(s)));
        if (locReserved || hasReservedContainer) {
          dotsReserved.push(sx, sy);
        } else {
          const occupied = loc.slots.some(s => s !== null);
          if (occupied) dotsOccupied.push(sx, sy);
          else          dotsEmpty.push(sx, sy);
        }
      } else {   // 'grey'
        _drawLocGrey(loc);
      }
    }
    if (tc.locsDisplay === 'dots') _flushDots(dotsEmpty, dotsOccupied, dotsReserved, r);
  }

  ctx = savedCtx;   // eslint-disable-line no-global-assign
}

// ─── Canvas setup ─────────────────────────────────────────────────────────────
const canvas  = document.getElementById('canvas');
let   ctx     = canvas.getContext('2d');
const statusEl  = document.getElementById('status');
const tooltipEl = document.getElementById('tooltip');
let W = 0, H = 0;
let renderQueued    = false;
let _renderThrottle = null;
const RENDER_THROTTLE_MS = 25;

// ─── Event queue — drain once per render, not once per SSE message ────────────
const _eventQueue = [];
let   _drainQueued = false;

function _queueEvent(msg) {
  if (document.hidden) {
    // Tab is inactive: update state immediately without scheduling a render.
    // This keeps the data model current and prevents unbounded queue growth.
    applyEvent(msg);
    return;
  }
  _eventQueue.push(msg);
  if (!_drainQueued) {
    _drainQueued = true;
    requestAnimationFrame(() => {
      _drainQueued = false;
      const batch = _eventQueue.splice(0);
      for (const m of batch) applyEvent(m);
    });
  }
}

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  _markBgDirty();
  forceRender();
}
window.addEventListener('resize', resize);
resize();

// When the tab becomes visible again, do a single catch-up render.
// Events were applied to state immediately while hidden, so no backlog to drain.
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') forceRender();
});

// ─── Viewport ─────────────────────────────────────────────────────────────────
let panX = W / 2, panY = H / 2, scale = 1;
let isIso = true;

// Project a world point to canvas pixels.
function project(wx, wy, wz) {
  let rx, ry;
  if (isIso) {
    rx = (wx - wy) * 0.866;
    ry = (wx + wy) * 0.5 - wz;
  } else {
    rx = wx;
    ry = wy;
  }
  return [rx * scale + panX, ry * scale + panY];
}

// Project all locations without pan/scale (for bounding box fitting).
function projectRaw(wx, wy, wz) {
  if (isIso) return [(wx - wy) * 0.866, (wx + wy) * 0.5 - wz];
  return [wx, wy];
}

function fitView() {
  if (locations.size === 0) return;
  const pts = [];
  for (const loc of locations.values()) {
    pts.push(projectRaw(...loc.coords));
  }
  const xs = pts.map(p => p[0]), ys = pts.map(p => p[1]);
  const minX = Math.min(...xs), maxX = Math.max(...xs);
  const minY = Math.min(...ys), maxY = Math.max(...ys);
  const bw = maxX - minX || 1, bh = maxY - minY || 1;
  const pad = 80;
  scale = Math.min((W - pad * 2) / bw, (H - pad * 2) / bh, 200);
  scale = Math.max(scale, 0.01);
  panX  = W / 2 - ((minX + maxX) / 2) * scale;
  panY  = H / 2 - ((minY + maxY) / 2) * scale;
  _markBgDirty();
  _rebuildHitGrid();
  forceRender();
}

// LOD thresholds are read from vizConfig.lodMidThreshold / lodHighThreshold via _activeTier().

// ─── Rendering ────────────────────────────────────────────────────────────────
// forceRender: bypass throttle for interactions (pan, zoom, hover, resize).
function forceRender() {
  if (!renderQueued) {
    renderQueued = true;
    requestAnimationFrame(() => { renderQueued = false; render(); });
  }
}

// requestRender: throttled path for SSE-driven updates. No-ops when tab is hidden.
function requestRender() {
  if (document.hidden || _renderThrottle) return;
  _renderThrottle = setTimeout(() => {
    _renderThrottle = null;
    forceRender();
  }, RENDER_THROTTLE_MS);
}

function _flushDots(dotsEmpty, dotsOccupied, dotsReserved, r) {
  const d = r * 2;
  if (dotsEmpty.length > 0) {
    ctx.beginPath();
    for (let i = 0; i < dotsEmpty.length; i += 2)
      ctx.rect(dotsEmpty[i] - r, dotsEmpty[i+1] - r, d, d);
    ctx.fillStyle = '#21262d';
    ctx.fill();
  }
  if (dotsOccupied.length > 0) {
    ctx.beginPath();
    for (let i = 0; i < dotsOccupied.length; i += 2)
      ctx.rect(dotsOccupied[i] - r, dotsOccupied[i+1] - r, d, d);
    ctx.fillStyle = '#238636';
    ctx.fill();
  }
  if (dotsReserved && dotsReserved.length > 0) {
    ctx.beginPath();
    for (let i = 0; i < dotsReserved.length; i += 2)
      ctx.rect(dotsReserved[i] - r, dotsReserved[i+1] - r, d, d);
    ctx.fillStyle = AMBER;
    ctx.fill();
  }
}

// Fast grey draw: just the location bounding box with occupied/empty color.
// No slot loop, no tile cache — O(1) canvas calls per location.
function _drawLocGrey(loc) {
  const [wx, wy, wz] = loc.coords;
  const [dx, dy, dz] = loc.meta.dims;
  const occupied = loc.slots.some(s => s !== null);
  const hasReservedContainer = loc.slots.some(s => s !== null && reservedContainerIds.has(String(s)));
  const locReserved = reservedLocationIds.has(String(loc.id));

  let fill, stroke;
  if (hasReservedContainer) {
    fill   = AMBER_FILL;
    stroke = AMBER;
  } else {
    fill   = occupied ? 'rgba(20,36,20,0.85)' : 'rgba(20,22,26,0.85)';
    stroke = locReserved ? AMBER : (occupied ? '#2a4a2a' : '#2a2f38');
  }
  if (isIso) {
    drawIsoCube(wx, wy, wz, dx, dy, dz, fill, fill, fill, stroke);
  } else {
    drawTopBox(wx, wy, dx, dy, fill, stroke);
  }
}

function _drawTile(loc, sx, sy) {
  if (!loc.slot_dims) {
    drawDetail(loc, sx, sy);
  } else {
    const tile = _getTile(loc);
    if (tile) ctx.drawImage(tile.canvas, sx + tile.relOx, sy + tile.relOy);
    else      drawDetail(loc, sx, sy);
  }
}

function render() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#0d1117';
  ctx.fillRect(0, 0, W, H);

  const tc = _activeTierConfig();
  const r  = Math.max(1.5, scale * 0.6);

  // Fast path during gesture: dots + first wireframe level only
  if (zooming || panning) {
    const dE = [], dO = [];
    for (const loc of locations.values()) {
      const [sx, sy] = project(...loc.coords);
      if (sx < -300 || sx > W + 300 || sy < -300 || sy > H + 300) continue;
      if (loc.slots.some(s => s !== null)) dO.push(sx, sy);
      else dE.push(sx, sy);
    }
    _flushDots(dE, dO, [], r);
    if (tc.wireframeLevels.length > 0) {
      const firstIdx = wireframeIndices.get(tc.wireframeLevels[0]);
      if (firstIdx) for (const [key] of firstIdx) _drawGroupWireframe(key, firstIdx, tc.wireframeLevels[0]);
    }
    return;
  }

  // ── Background layer (cached) ─────────────────────────────────────────────
  // Wireframes + all locs drawn per locsDisplay — rebuilt only when viewport
  // or data changes, not on every hover event.
  _paintBackground(tc);
  ctx.drawImage(_bgCanvas, 0, 0);

  // ── Hover overlay (cheap — only the hovered group's locs) ─────────────────
  const hoverIdx = hoverIndices.get(tc.hoverLevel);
  if (hoveredAisleKey !== null && hoverIdx) {
    const hoverLocs = hoverIdx.get(hoveredAisleKey);
    if (hoverLocs) {
      const dotsEmpty = [], dotsOccupied = [], dotsReserved = [];
      for (const id of hoverLocs) {
        const loc = locations.get(id);
        if (!loc) continue;
        const [sx, sy] = project(...loc.coords);
        if (sx < -300 || sx > W + 300 || sy < -300 || sy > H + 300) continue;
        if (tc.hoverDetail === 'dots') {
          const locReserved = reservedLocationIds.has(String(loc.id));
          const hasReservedContainer = loc.slots.some(s => s !== null && reservedContainerIds.has(String(s)));
          if (locReserved || hasReservedContainer) {
            dotsReserved.push(sx, sy);
          } else {
            const occupied = loc.slots.some(s => s !== null);
            if (occupied) dotsOccupied.push(sx, sy);
            else          dotsEmpty.push(sx, sy);
          }
        } else if (tc.hoverDetail === 'tiles') {
          _drawTile(loc, sx, sy);
        }
        // 'none': hovered locs show through from background unchanged
      }
      if (tc.hoverDetail === 'dots') _flushDots(dotsEmpty, dotsOccupied, dotsReserved, r);
    }

    // Hover group outline + optional sub-level wireframes
    _drawGroupWireframe(hoveredAisleKey, hoverIdx, tc.hoverLevel);
    if (tc.hoverWireframeLevel) {
      const wfIdx = wireframeIndices.get(tc.hoverWireframeLevel);
      const hoverLocs2 = hoverIdx.get(hoveredAisleKey);
      if (wfIdx && hoverLocs2) {
        for (const [key, keyLocIds] of wfIdx) {
          for (const id of keyLocIds) {
            if (hoverLocs2.has(id)) { _drawGroupWireframe(key, wfIdx, tc.hoverWireframeLevel); break; }
          }
        }
      }
    }
  }
}

function drawRect(loc, sx, sy, occupied) {
  const factor = Math.min(scale / vizConfig.lodMidThreshold, 3);
  const w = 36 * factor, h = 20 * factor;
  const x0 = sx - w / 2, y0 = sy - h / 2;

  ctx.fillStyle   = occupied ? '#0d2a0d' : '#161b22';
  ctx.strokeStyle = occupied ? '#238636' : '#30363d';
  ctx.lineWidth   = 1;
  ctx.fillRect(x0, y0, w, h);
  ctx.strokeRect(x0, y0, w, h);

  if (scale > 5) {
    ctx.fillStyle    = '#e6edf3';
    ctx.font         = `${Math.min(14, w * 0.28)}px monospace`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(String(loc.id).slice(0, 10), sx, sy);
  }
}

// ─── 3-D geometry helpers ─────────────────────────────────────────────────────

// Fill a polygon defined by projected screen points, then stroke it.
function _face(pts, fill, stroke) {
  ctx.beginPath();
  ctx.moveTo(pts[0][0], pts[0][1]);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
  ctx.closePath();
  ctx.fillStyle = fill;   ctx.fill();
  ctx.strokeStyle = stroke; ctx.lineWidth = 0.5; ctx.stroke();
}

// Draw text on an isometric face, shrinking font size to fit maxWidth.
function _isoText(text, cx, cy, angle, maxWidth, maxSize, baseline, offsetY = 0) {
  ctx.font = `${maxSize}px monospace`;
  const measured = ctx.measureText(text).width;
  const size = measured > maxWidth ? maxSize * (maxWidth / measured) : maxSize;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angle);
  ctx.fillStyle = '#e6edf3';
  ctx.font = `${size}px monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = baseline;
  ctx.fillText(text, 0, offsetY);
  ctx.restore();
}

// Draw a polygon outline only (no fill).
function _outlinePolygon(pts, strokeColor, lineWidth = 1.5) {
  ctx.beginPath();
  ctx.moveTo(pts[0][0], pts[0][1]);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
  ctx.closePath();
  ctx.strokeStyle = strokeColor;
  ctx.lineWidth = lineWidth;
  ctx.stroke();
}

// Fill a polygon with alternating-color diagonal hatch lines, clipped to the shape.
function _crosshatchPolygon(pts, color1, color2, spacing = 5) {
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(pts[0][0], pts[0][1]);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
  ctx.closePath();
  ctx.clip();
  const xs = pts.map(p => p[0]), ys = pts.map(p => p[1]);
  const x0 = Math.min(...xs), x1 = Math.max(...xs);
  const y0 = Math.min(...ys), y1 = Math.max(...ys);
  const h = y1 - y0;
  ctx.lineWidth = 1;
  let toggle = false;
  for (let d = -(h); d < (x1 - x0) + h; d += spacing) {
    ctx.strokeStyle = toggle ? color2 : color1;
    ctx.beginPath();
    ctx.moveTo(x0 + d, y0);
    ctx.lineTo(x0 + d + h, y1);
    ctx.stroke();
    toggle = !toggle;
  }
  ctx.restore();
}

// Draw the three visible isometric faces of an axis-aligned box.
// (wx,wy,wz) is the min-corner; (dx,dy,dz) are the extents.
//
// With rx=(wx-wy)*0.866, ry=(wx+wy)*0.5-wz the three visible faces are:
//   left  (y+ side) — bottom-left  rhombus in screen space
//   right (x+ side) — bottom-right rhombus in screen space
//   top   (z+ side) — top diamond  in screen space
//
// y- is NOT a visible face: it projects onto the same screen area as x+ and
// z+, and drawing it last would overwrite them with the wrong colour.
// Draw order: left → right → top (back-to-front painter's algorithm).
function drawIsoCube(wx, wy, wz, dx, dy, dz,
                     topColor, rightColor, leftColor, strokeColor) {
  const p = (x, y, z) => project(x, y, z);
  // left face (y+ side — bottom-left in screen)
  _face([p(wx,    wy+dy, wz),    p(wx+dx, wy+dy, wz),
         p(wx+dx, wy+dy, wz+dz), p(wx,    wy+dy, wz+dz)],
        leftColor, strokeColor);
  // right face (x+ side — bottom-right in screen)
  _face([p(wx+dx, wy,    wz),    p(wx+dx, wy+dy, wz),
         p(wx+dx, wy+dy, wz+dz), p(wx+dx, wy,    wz+dz)],
        rightColor, strokeColor);
  // top face (z+ side — drawn last so it sits on top)
  _face([p(wx,    wy+dy, wz+dz), p(wx+dx, wy+dy, wz+dz),
         p(wx+dx, wy,    wz+dz), p(wx,    wy,    wz+dz)],
        topColor, strokeColor);
}

// Draw the XY footprint of a box (top-down 2-D view).
function drawTopBox(wx, wy, dx, dy, fill, stroke) {
  const [x0, y0] = project(wx,    wy,    0);
  const [x1, y1] = project(wx+dx, wy+dy, 0);
  ctx.fillStyle = fill; ctx.strokeStyle = stroke; ctx.lineWidth = 0.5;
  ctx.fillRect(x0, y0, x1-x0, y1-y0);
  ctx.strokeRect(x0, y0, x1-x0, y1-y0);
}

// ─── Detail renderer (LOD_CLOSE and above) ────────────────────────────────────

function drawDetail(loc, sx, sy) {
  // If location carries spatial geometry, render 3-D cubes.
  if (loc.slot_dims && loc.slot_offsets) {
    _drawDetail3D(loc);
  } else {
    _drawDetailCard(loc, sx, sy);
  }
}

function _drawDetail3D(loc) {
  const [wx, wy, wz] = loc.coords;
  const [dx, dy, dz] = loc.meta.dims;

  // Location bounding cube — subtle dark fill; amber outline if location is reserved
  const locBoundStroke = reservedLocationIds.has(String(loc.id)) ? AMBER : '#30363d';
  if (isIso) {
    drawIsoCube(wx, wy, wz, dx, dy, dz,
      'rgba(26,31,38,0.8)', 'rgba(18,22,28,0.8)', 'rgba(18,22,28,0.8)', locBoundStroke);
  } else {
    drawTopBox(wx, wy, dx, dy, 'rgba(26,31,38,0.8)', locBoundStroke);
  }

  // Slot cubes
  const [sdx, sdy, sdz] = loc.slot_dims;
  for (let i = 0; i < loc.slots.length; i++) {
    const [ox, oy, oz] = loc.slot_offsets[i];
    const cid = loc.slots[i];
    const occ = cid !== null;

    const isAddable   = loc.addable_slots   && loc.addable_slots.includes(i);
    const isRemovable = loc.removable_slots && loc.removable_slots.includes(i);
    const isReserved  = cid !== null && reservedContainerIds.has(String(cid));

    if (isIso) {
      const p = (x, y, z) => project(x, y, z);
      const sx2 = wx+ox, sy2 = wy+oy, sz2 = wz+oz;
      const topCol  = isReserved ? '#3d2e00' : (occ ? '#1a4a1a' : '#1c2128');
      const sideCol = isReserved ? '#2a1e00' : (occ ? '#0f2e0f' : '#141a1f');
      const stroke  = isReserved ? AMBER     : (occ ? '#3fb950' : '#444c56');
      // y+ face: left wall (bottom-left in screen)
      _face([p(sx2,     sy2+sdy, sz2),     p(sx2+sdx, sy2+sdy, sz2),
             p(sx2+sdx, sy2+sdy, sz2+sdz), p(sx2,     sy2+sdy, sz2+sdz)],
            sideCol, stroke);
      // x+ face: right wall / divider between slots
      _face([p(sx2+sdx, sy2,     sz2),     p(sx2+sdx, sy2+sdy, sz2),
             p(sx2+sdx, sy2+sdy, sz2+sdz), p(sx2+sdx, sy2,     sz2+sdz)],
            sideCol, stroke);
      // z+ top face
      const topPts = [p(sx2,     sy2+sdy, sz2+sdz), p(sx2+sdx, sy2+sdy, sz2+sdz),
                      p(sx2+sdx, sy2,     sz2+sdz), p(sx2,     sy2,     sz2+sdz)];
      _face(topPts, topCol, stroke);
      // Channel-processor overlay on top face
      if (isAddable && isRemovable) {
        _crosshatchPolygon(topPts, '#58a6ff', '#bc8cff', 5);
        _outlinePolygon(topPts, '#58a6ff');
      } else if (isAddable) {
        _outlinePolygon(topPts, '#58a6ff');
      } else if (isRemovable) {
        _outlinePolygon(topPts, '#bc8cff');
      }
    } else {
      const [bx0, by0] = project(wx+ox,     wy+oy,     0);
      const [bx1, by1] = project(wx+ox+sdx, wy+oy+sdy, 0);
      drawTopBox(wx+ox, wy+oy, sdx, sdy,
        isReserved ? '#3d2e00' : (occ ? '#1a4a1a' : '#1c2128'),
        isReserved ? AMBER     : (occ ? '#3fb950' : '#444c56'));
      if (isAddable || isRemovable) {
        const rectPts = [[bx0,by0],[bx1,by0],[bx1,by1],[bx0,by1]];
        if (isAddable && isRemovable) {
          _crosshatchPolygon(rectPts, '#58a6ff', '#bc8cff', 4);
          _outlinePolygon(rectPts, '#58a6ff');
        } else if (isAddable) {
          _outlinePolygon(rectPts, '#58a6ff');
        } else {
          _outlinePolygon(rectPts, '#bc8cff');
        }
      }
    }

    if (isIso && scale > 10) {
      const sx2 = wx+ox, sy2 = wy+oy, sz2 = wz+oz;
      // Channel index — top of y+ (left) face, +30° to follow world +x axis
      const [lix, liy] = project(sx2+sdx/2, sy2+sdy, sz2+sdz);
      _isoText(String(i), lix, liy, Math.PI/6, sdx * scale * 0.85, 11, 'top', 11/2);
      // Container name + UOM icon — center of z+ (top) face, -30° to follow world -y axis
      if (cid) {
        const c = loc.containers[cid] || containers.get(String(cid));
        const icon = c ? _uomIcon(c.uom) : '';
        const [tx, ty] = project(sx2+sdx/2, sy2+sdy/2, sz2+sdz);
        _isoText(icon + ' ' + String(cid), tx, ty, -Math.PI/6, sdy * scale * 0.85, 11, 'middle');
      }
    }
  }

  // Location ID — top of x+ (right) face of bounding cube, -30° to follow world -y axis
  if (scale > 10 && vizConfig.showLocIds) {
    if (isIso) {
      const [lx, ly] = project(wx+dx, wy+dy/2, wz+dz);
      _isoText(String(loc.id), lx, ly, -Math.PI/6, dy * scale * 0.85, 12, 'top', 12/2);
    } else {
      const [lx, ly] = project(wx + dx/2, wy + dy/2, 0);
      _isoText(String(loc.id), lx, ly, 0, dx * scale * 0.85, 12, 'middle');
    }
  }
}

// Fallback: flat screen-space card (used when slot_dims/slot_offsets are absent)
function _drawDetailCard(loc, sx, sy) {
  const nSlots  = loc.slots.length;
  const slotW   = 20, slotH = 20, gap = 3;
  const padH    = 12, padV = 20;
  const totalW  = nSlots * (slotW + gap) - gap + padH * 2;
  const totalH  = slotH + padV * 2;
  const x0 = sx - totalW / 2, y0 = sy - totalH / 2;

  ctx.fillStyle   = '#161b22';
  ctx.strokeStyle = '#30363d';
  ctx.lineWidth   = 1;
  ctx.fillRect(x0, y0, totalW, totalH);
  ctx.strokeRect(x0, y0, totalW, totalH);

  if (scale > 10) {
    ctx.fillStyle    = '#e6edf3'; ctx.font = '12px monospace';
    ctx.textAlign    = 'left';   ctx.textBaseline = 'top';
    ctx.fillText(String(loc.id).slice(0, 14), x0 + 4, y0 + 3);
  }

  const used = loc.slots.filter(s => s !== null).length;
  ctx.fillStyle = '#e6edf3';
  ctx.textAlign = 'right'; ctx.textBaseline = 'bottom';
  ctx.fillText(`${used}/${nSlots}`, x0 + totalW - 4, y0 + totalH - 3);

  for (let i = 0; i < nSlots; i++) {
    const cid   = loc.slots[i];
    const slotX = x0 + padH + i * (slotW + gap);
    const slotY = y0 + padV;
    ctx.fillStyle   = cid ? '#0d2a0d' : '#0d1117';
    ctx.strokeStyle = cid ? '#238636' : '#30363d';
    ctx.lineWidth   = 1;
    ctx.fillRect(slotX, slotY, slotW, slotH);
    ctx.strokeRect(slotX, slotY, slotW, slotH);
    if (cid) {
      const c = loc.containers[cid];
      const icon = c ? _uomIcon(c.uom) : '';
      ctx.fillStyle = '#e6edf3'; ctx.font = '11px monospace';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(icon, slotX + slotW/2, slotY + slotH/2 - 4);
      ctx.font = '9px monospace';
      ctx.fillText(String(cid).slice(0, 4), slotX + slotW/2, slotY + slotH/2 + 5);
    }
  }
}

// ─── Interaction: pan & zoom ───────────────────────────────────────────────────
let dragging = false, lastMX = 0, lastMY = 0;

canvas.addEventListener('mousedown', e => {
  dragging = true;
  lastMX = e.clientX; lastMY = e.clientY;
  canvas.classList.add('dragging');
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  panX += e.clientX - lastMX;
  panY += e.clientY - lastMY;
  lastMX = e.clientX; lastMY = e.clientY;
  panning = true;
  clearTimeout(_panTimer);
  _panTimer = setTimeout(() => { panning = false; _markBgDirty(); _rebuildHitGrid(); forceRender(); }, 50);
  forceRender();
});
window.addEventListener('mouseup', () => {
  dragging = false;
  canvas.classList.remove('dragging');
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY > 0 ? 0.88 : 1 / 0.88;
  panX = e.clientX - (e.clientX - panX) * factor;
  panY = e.clientY - (e.clientY - panY) * factor;
  scale *= factor;
  _onZoom();
  forceRender();
}, { passive: false });

// ─── Interaction: touch (pan + pinch-zoom) ────────────────────────────────────
let lastTouchX = 0, lastTouchY = 0, lastPinchDist = null;

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (e.touches.length === 1) {
    lastTouchX = e.touches[0].clientX;
    lastTouchY = e.touches[0].clientY;
    lastPinchDist = null;
  } else if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    lastPinchDist = Math.hypot(dx, dy);
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && lastPinchDist === null) {
    panX += e.touches[0].clientX - lastTouchX;
    panY += e.touches[0].clientY - lastTouchY;
    lastTouchX = e.touches[0].clientX;
    lastTouchY = e.touches[0].clientY;
    panning = true;
    clearTimeout(_panTimer);
    _panTimer = setTimeout(() => { panning = false; _markBgDirty(); _rebuildHitGrid(); forceRender(); }, 50);
    forceRender();
  } else if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.hypot(dx, dy);
    if (lastPinchDist !== null) {
      const factor = dist / lastPinchDist;
      const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
      panX = cx - (cx - panX) * factor;
      panY = cy - (cy - panY) * factor;
      scale *= factor;
      _onZoom();
      forceRender();
    }
    lastPinchDist = dist;
  }
}, { passive: false });

canvas.addEventListener('touchend', e => {
  if (e.touches.length < 2) lastPinchDist = null;
}, { passive: false });

// ─── Interaction: tooltip on hover ────────────────────────────────────────────
let _aisleDebounceTimer = null;
let _pendingAisleKey    = null;

function _prewarmGroup(key) {
  const tc = _activeTierConfig();
  if (!key || tc.hoverDetail !== 'tiles') return;
  const idx = hoverIndices.get(tc.hoverLevel);
  if (!idx) return;
  const ids = idx.get(key);
  if (!ids) return;
  for (const id of ids) {
    const loc = locations.get(id);
    if (loc && loc.slot_dims) _getTile(loc, false);
  }
}

function _commitHoverKey(key) {
  if (key !== hoveredAisleKey) {
    hoveredAisleKey = key;
    forceRender();
  }
}

canvas.addEventListener('mousemove', e => {
  if (dragging) { tooltipEl.style.display = 'none'; return; }
  const hit = hitTest(e.clientX, e.clientY);
  if (!hit) {
    tooltipEl.style.display = 'none';
    clearTimeout(_aisleDebounceTimer);
    _pendingAisleKey = null;
    const needsRender = hoveredAisleKey !== null || hoveredLocId !== null;
    hoveredAisleKey = null;
    hoveredLocId    = null;
    if (needsRender) forceRender();
    return;
  }
  hoveredLocId = hit.id;
  const newKey = _groupKey(hit, _activeTierConfig().hoverLevel);
  if (newKey !== hoveredAisleKey && newKey !== _pendingAisleKey) {
    _pendingAisleKey = newKey;
    clearTimeout(_aisleDebounceTimer);
    setTimeout(() => _prewarmGroup(newKey), 0);
    _aisleDebounceTimer = setTimeout(() => _commitHoverKey(newKey), 25);
  }

  const used = hit.slots.filter(s => s !== null).length;
  let html = `<strong>${hit.id}</strong><br>`;
  html += `<em>coords</em> [${hit.coords.map(v => v.toFixed(1)).join(', ')}]<br>`;
  html += `<em>processor</em> ${hit.meta.channel_processor}<br>`;
  html += `<em>capacity</em> ${used} / ${hit.slots.length}<br>`;

  const cEntries = Object.entries(hit.containers);
  if (cEntries.length > 0) {
    html += `<br><em>containers</em><br>`;
    for (const [cid, c] of cEntries) {
      const label = c.contents.length > 0
        ? c.contents.map(cc => `${cc.qty}×${cc.uom} ${cc.resource}`).join(', ')
        : '(empty)';
      html += `&nbsp;${String(cid).slice(0, 10)}… ${label}<br>`;
    }
  }

  tooltipEl.innerHTML = html;
  tooltipEl.style.display = 'block';
  tooltipEl.style.left = (e.clientX + 14) + 'px';
  tooltipEl.style.top  = (e.clientY + 14) + 'px';
});
canvas.addEventListener('mouseleave', () => {
  tooltipEl.style.display = 'none';
  const needsRender = hoveredAisleKey !== null || hoveredLocId !== null;
  hoveredAisleKey = null;
  hoveredLocId    = null;
  if (needsRender) forceRender();
});

// ─── Hit-test spatial grid ────────────────────────────────────────────────────
// Screen-space grid: loc visual centres bucketed into HIT_CELL-px cells.
// Rebuilt on zoom settle / pan end / view toggle / loc changes.
// hitTest is then O(candidates in one cell) rather than O(all locations).
const HIT_CELL   = 48;
const _hitGrid   = new Map();  // `${cx},${cy}` → locId[]

function _projectLocCentre(loc) {
  const [wx, wy, wz] = loc.coords;
  const [dx, dy, dz] = loc.meta.dims;
  return isIso
    ? project(wx + dx / 2, wy + dy / 2, wz + dz / 2)
    : project(wx + dx / 2, wy + dy / 2, 0);
}

function _rebuildHitGrid() {
  _hitGrid.clear();
  for (const loc of locations.values()) {
    const [sx, sy] = _projectLocCentre(loc);
    // Insert into the cell and its ±1 neighbours so locs near cell boundaries
    // are always found regardless of which side the cursor falls on.
    const cx = Math.floor(sx / HIT_CELL);
    const cy = Math.floor(sy / HIT_CELL);
    for (let ddx = -1; ddx <= 1; ddx++) {
      for (let ddy = -1; ddy <= 1; ddy++) {
        const key = `${cx + ddx},${cy + ddy}`;
        if (!_hitGrid.has(key)) _hitGrid.set(key, []);
        _hitGrid.get(key).push(loc.id);
      }
    }
  }
}

function hitTest(mx, my) {
  const cx = Math.floor(mx / HIT_CELL);
  const cy = Math.floor(my / HIT_CELL);
  const candidates = _hitGrid.get(`${cx},${cy}`);
  if (!candidates || candidates.length === 0) return null;

  let bestDistSq = Infinity;
  let hit = null;
  for (const id of candidates) {
    const loc = locations.get(id);
    if (!loc) continue;
    const [sx, sy] = _projectLocCentre(loc);
    const d2 = (mx - sx) ** 2 + (my - sy) ** 2;
    if (d2 < bestDistSq) { bestDistSq = d2; hit = loc; }
  }
  if (!hit) return null;
  // Reject if too far from the nearest centre (scale-proportional radius).
  const [dx, dy, dz] = hit.meta.dims;
  const reach = Math.hypot(dx / 2, dy / 2, isIso ? dz / 2 : 0) * scale * 1.5;
  return bestDistSq <= reach * reach ? hit : null;
}

// ─── View toggle ──────────────────────────────────────────────────────────────
document.getElementById('btn-iso').addEventListener('click', () => {
  isIso = true;
  tileCache.clear();
  document.getElementById('btn-iso').classList.add('active');
  document.getElementById('btn-2d').classList.remove('active');
  fitView();
});
document.getElementById('btn-2d').addEventListener('click', () => {
  isIso = false;
  tileCache.clear();
  document.getElementById('btn-2d').classList.add('active');
  document.getElementById('btn-iso').classList.remove('active');
  fitView();
});
document.getElementById('btn-fit').addEventListener('click', fitView);

// ─── SSE event application ────────────────────────────────────────────────────
function applyEvent(msg) {
  const { type, payload } = msg;
  switch (type) {
    case 'location_registered': {
      locations.set(payload.id, payload);
      _indexLoc(payload);
      for (const [cid, c] of Object.entries(payload.containers || {})) {
        containers.set(cid, c);
      }
      _markBgDirty();
      break;
    }
    case 'container_registered': {
      containers.set(payload.id, payload);
      if (payload.uom) _uomIcon(payload.uom);
      break;
    }
    case 'container_moved': {
      const { container_id, container_uom, from_loc_id, to_loc_id,
              from_slots, to_slots,
              from_addable_slots, from_removable_slots,
              to_addable_slots,   to_removable_slots } = payload;
      if (container_uom) {
        _uomIcon(container_uom);
        if (!containers.has(container_id)) {
          containers.set(container_id, { id: container_id, uom: container_uom, contents: [] });
        }
      }
      if (from_loc_id && locations.has(from_loc_id)) {
        const loc = locations.get(from_loc_id);
        loc.slots = from_slots;
        if (from_addable_slots  !== undefined) loc.addable_slots  = from_addable_slots;
        if (from_removable_slots !== undefined) loc.removable_slots = from_removable_slots;
        delete loc.containers[container_id];
        tileCache.delete(from_loc_id);
        _markBgDirty();
      }
      if (to_loc_id && locations.has(to_loc_id)) {
        const loc = locations.get(to_loc_id);
        loc.slots = to_slots;
        if (to_addable_slots  !== undefined) loc.addable_slots  = to_addable_slots;
        if (to_removable_slots !== undefined) loc.removable_slots = to_removable_slots;
        const c = containers.get(container_id);
        if (c) loc.containers[container_id] = c;
        tileCache.delete(to_loc_id);
        _markBgDirty();
      } else if (!to_loc_id) {
        // delete_container_on_transfer — container is gone, clean up global map
        containers.delete(container_id);
      }
      break;
    }
    case 'content_changed': {
      const { container_id, loc_id, contents } = payload;
      if (containers.has(container_id)) {
        containers.get(container_id).contents = contents;
      }
      if (loc_id && locations.has(loc_id)) {
        const c = locations.get(loc_id).containers[container_id];
        if (c) c.contents = contents;
        tileCache.delete(loc_id);
        _markBgDirty();
      }
      break;
    }
    case 'container_removed': {
      const cid = payload.id;
      containers.delete(cid);
      // Use loc_id from payload when available (O(1)); fall back to scan only if absent.
      if (payload.loc_id && locations.has(payload.loc_id)) {
        delete locations.get(payload.loc_id).containers[cid];
        tileCache.delete(payload.loc_id);
      } else {
        for (const loc of locations.values()) {
          if (cid in loc.containers) { delete loc.containers[cid]; tileCache.delete(loc.id); break; }
        }
      }
      _markBgDirty();
      break;
    }
    case 'container_reserved': {
      reservedContainerIds.add(String(payload.container_id));
      tileCache.clear();
      _markBgDirty();
      break;
    }
    case 'container_unreserved': {
      reservedContainerIds.delete(String(payload.container_id));
      tileCache.clear();
      _markBgDirty();
      break;
    }
    case 'location_reserved': {
      reservedLocationIds.add(String(payload.location_id));
      _markBgDirty();
      break;
    }
    case 'location_unreserved': {
      reservedLocationIds.delete(String(payload.location_id));
      _markBgDirty();
      break;
    }
    case 'reservation_failed':
      break;   // no visual state change
    case 'sim_status': {
      const running = payload.running;
      btnSimStart.disabled = running;
      btnSimStop.disabled  = !running;
      simStatusEl.textContent = running
        ? `running · ${payload.ops.toLocaleString()} ops · ${payload.fill_pct}% full`
        : '';
      break;
    }
  }
  requestRender();
}

// ─── Data loading & SSE connection ────────────────────────────────────────────
const SNAPSHOT_PAGE = 1000;

async function loadSnapshot() {
  let offset = 0;
  let total  = null;

  statusEl.textContent = 'Loading snapshot…';

  do {
    const res = await fetch(`/v1/snapshot?offset=${offset}&limit=${SNAPSHOT_PAGE}`);
    if (!res.ok) throw new Error(`Snapshot HTTP ${res.status}`);
    const data = await res.json();
    total = data.total;

    for (const [id, loc] of Object.entries(data.locations)) {
      locations.set(id, loc);
      _indexLoc(loc);
      for (const [cid, c] of Object.entries(loc.containers)) {
        containers.set(cid, c);
        if (c.uom) _uomIcon(c.uom);
      }
    }
    _markBgDirty();

    // Reservation state is included on each page; accumulate across pages
    for (const id of (data.reserved_container_ids || [])) reservedContainerIds.add(id);
    for (const id of (data.reserved_location_ids  || [])) reservedLocationIds.add(id);

    offset += SNAPSHOT_PAGE;
    statusEl.textContent = `Loading… ${locations.size.toLocaleString()} / ${total.toLocaleString()}`;
    requestRender();

    // Yield to the browser for a full frame between pages
    await new Promise(r => requestAnimationFrame(r));

  } while (offset < total);

  statusEl.textContent = `${locations.size.toLocaleString()} locations loaded`;
  fitView();
  const tc0 = _activeTierConfig();
  if (tc0.hoverDetail === 'tiles') _prewarmTiles([...locations.values()]);
}

let _prewarmGeneration = 0;  // incremented to cancel in-flight prewarms

function _prewarmTiles(locs, i = 0, gen = null) {
  if (!('requestIdleCallback' in window)) return;  // Safari fallback: skip
  if (gen === null) gen = ++_prewarmGeneration;    // new caller starts a new generation
  requestIdleCallback(deadline => {
    if (gen !== _prewarmGeneration) return;        // cancelled by a newer prewarm
    while (i < locs.length && deadline.timeRemaining() > 2) {
      const loc = locs[i++];
      if (loc.slot_dims) _getTile(loc);
    }
    if (i < locs.length) _prewarmTiles(locs, i, gen);
  });
}

function connectSSE(subscriberId) {
  const es = new EventSource(`/v1/events/${subscriberId}`);

  es.addEventListener('message', e => {
    _queueEvent(JSON.parse(e.data));
    statusEl.textContent = `${locations.size} locations · live`;
  });

  es.addEventListener('open', () => {
    statusEl.textContent = `${locations.size} locations · live`;
  });

  es.addEventListener('error', () => {
    // Close current stream and re-run full boot sequence.
    // Handles server restarts, subscriber eviction, and transient errors.
    es.close();
    statusEl.textContent = 'Disconnected — reconnecting…';
    setTimeout(boot, 2000);
  });
}

async function boot() {
  const MAX_ATTEMPTS = 30;
  const RETRY_BASE_MS = 500;

  for (let attempt = 1; attempt <= MAX_ATTEMPTS; attempt++) {
    try {
      statusEl.textContent = attempt === 1
        ? 'Connecting…'
        : `Server not ready — retrying… (${attempt}/${MAX_ATTEMPTS})`;

      // 1. Obtain subscriber_id before loading snapshot so no events are missed
      const subRes = await fetch('/v1/subscribe', { method: 'POST' });
      if (!subRes.ok) throw new Error(`Subscribe HTTP ${subRes.status}`);
      const { subscriber_id } = await subRes.json();

      // 2. Load current state
      await loadSnapshot();

      // 3. Open live stream — buffered events from step 1→2 window arrive first
      connectSSE(subscriber_id);

      // 4. Clean up on page unload
      window.addEventListener('beforeunload', () => {
        navigator.sendBeacon(`/unsubscribe/${subscriber_id}`);
      });

      return;  // success — exit retry loop

    } catch (err) {
      if (attempt >= MAX_ATTEMPTS) {
        statusEl.textContent = `Could not connect after ${MAX_ATTEMPTS} attempts: ${err.message}`;
        console.error(err);
        return;
      }
      const delayMs = Math.min(RETRY_BASE_MS * attempt, 5000);
      statusEl.textContent = `Server not ready — retrying in ${(delayMs / 1000).toFixed(1)}s…`;
      await new Promise(r => setTimeout(r, delayMs));
    }
  }
}

// Initialize index structure so _indexLoc has level-keyed Maps to add into during snapshot load
_rebuildIndices();
boot();

// ─── Simulation controls ──────────────────────────────────────────────────────
const btnSimStart   = document.getElementById('btn-sim-start');
const btnSimStop    = document.getElementById('btn-sim-stop');
const simStatusEl   = document.getElementById('sim-status');

async function _pollSimStatus() {
  try {
    const res  = await fetch('/v1/simulate/status');
    if (!res.ok) return;
    const data = await res.json();
    btnSimStart.disabled = data.running;
    btnSimStop.disabled  = !data.running;
    simStatusEl.textContent = data.running
      ? `running · ${data.ops.toLocaleString()} ops · ${data.fill_pct}% full`
      : '';
  } catch (_) {}
}

// ─── Simulation config dialog ─────────────────────────────────────────────────
const simDialogOverlay  = document.getElementById('sim-dialog-overlay');
const simModeEl         = document.getElementById('sim-mode');
const simEvaluatorRow   = document.getElementById('sim-evaluator-row');
const simWeightsSection = document.getElementById('sim-weights-section');

function _updateSimDialogVisibility() {
  const isRandom = simModeEl.value === 'random';
  simEvaluatorRow.style.display   = isRandom ? '' : 'none';
  simWeightsSection.style.display = isRandom ? '' : 'none';
}
simModeEl.addEventListener('change', _updateSimDialogVisibility);
_updateSimDialogVisibility();

btnSimStart.addEventListener('click', () => {
  simDialogOverlay.classList.add('visible');
});

document.getElementById('sim-dialog-cancel').addEventListener('click', () => {
  simDialogOverlay.classList.remove('visible');
});

document.getElementById('sim-dialog-ok').addEventListener('click', async () => {
  simDialogOverlay.classList.remove('visible');
  btnSimStart.disabled = true;

  const mode = simModeEl.value;
  const body = {
    mode,
    delay_ms:      parseFloat(document.getElementById('sim-delay').value)     || 0,
    min_fill_pct:  parseFloat(document.getElementById('sim-min-fill').value)  || 0.15,
    max_fill_pct:  parseFloat(document.getElementById('sim-max-fill').value)  || 0.85,
  };
  if (mode === 'random') {
    body.dest_loc_evaluator = document.getElementById('sim-evaluator').value;
    body.add_weight    = parseFloat(document.getElementById('sim-add-weight').value)    || 0.45;
    body.move_weight   = parseFloat(document.getElementById('sim-move-weight').value)   || 0.40;
    body.remove_weight = parseFloat(document.getElementById('sim-remove-weight').value) || 0.15;
  }

  try {
    const res = await fetch('/v1/simulate/start', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      alert(`Failed to start simulation:\n${err.detail || res.statusText}`);
      btnSimStart.disabled = false;
      return;
    }
  } catch (e) {
    alert(`Failed to start simulation: ${e}`);
    btnSimStart.disabled = false;
    return;
  }
  _pollSimStatus();
});

btnSimStop.addEventListener('click', async () => {
  btnSimStop.disabled = true;
  try { await fetch('/v1/simulate/stop', { method: 'POST' }); } catch (_) {}
  _pollSimStatus();
});

_pollSimStatus(); // one-time fetch on load; updates after that come via sim_status SSE events

// ─── Viz config dialog ────────────────────────────────────────────────────────
const vizDialogOverlay = document.getElementById('viz-dialog-overlay');

document.getElementById('btn-viz-config').addEventListener('click', () => {
  vizDialogOverlay.classList.add('visible');
});
document.getElementById('viz-dialog-close').addEventListener('click', () => {
  vizDialogOverlay.classList.remove('visible');
});

function _applyVizConfig() {
  _rebuildIndices();
  tileCache.clear();
  forceRender();
}

function _readWfChecks(cls) {
  return [...document.querySelectorAll(`.${cls}:checked`)].map(cb => cb.value);
}

// Wireframe checkboxes
for (const [tier, cls] of [['low','viz-wf-low'],['mid','viz-wf-mid'],['high','viz-wf-high']]) {
  for (const cb of document.querySelectorAll(`.${cls}`)) {
    cb.addEventListener('change', () => {
      vizConfig.tiers[tier].wireframeLevels = _readWfChecks(cls);
      _applyVizConfig();
    });
  }
}

// Thresholds
document.getElementById('viz-lod-mid').addEventListener('change', e => {
  const v = parseFloat(e.target.value);
  if (v > 0) { vizConfig.lodMidThreshold = v; _applyVizConfig(); }
});
document.getElementById('viz-lod-high').addEventListener('change', e => {
  const v = parseFloat(e.target.value);
  if (v > 0) { vizConfig.lodHighThreshold = v; _applyVizConfig(); }
});

// Per-tier hover level / detail / locs display / hover wireframe level
for (const tier of ['low', 'mid', 'high']) {
  document.getElementById(`viz-hover-level-${tier}`).addEventListener('change', e => {
    vizConfig.tiers[tier].hoverLevel = e.target.value || null;
    _applyVizConfig();
  });
  document.getElementById(`viz-hover-detail-${tier}`).addEventListener('change', e => {
    vizConfig.tiers[tier].hoverDetail = e.target.value;
    forceRender();
  });
  document.getElementById(`viz-locs-${tier}`).addEventListener('change', e => {
    vizConfig.tiers[tier].locsDisplay = e.target.value;
    tileCache.clear();
    forceRender();
  });
  document.getElementById(`viz-wf-hover-level-${tier}`).addEventListener('change', e => {
    vizConfig.tiers[tier].hoverWireframeLevel = e.target.value || null;
    _applyVizConfig();
  });
}

// Show loc IDs
document.getElementById('viz-show-loc-ids').addEventListener('change', e => {
  vizConfig.showLocIds = e.target.checked;
  tileCache.clear();
  forceRender();
});

// ─── Confirm modal ────────────────────────────────────────────────────────────
const confirmOverlay = document.getElementById('confirm-overlay');
const confirmTitle   = document.getElementById('confirm-title');
const confirmDesc    = document.getElementById('confirm-desc');
const confirmInput   = document.getElementById('confirm-input');
const confirmOk      = document.getElementById('confirm-ok');
const confirmCancel  = document.getElementById('confirm-cancel');
let   _confirmResolve = null;

function _showConfirm(title, desc) {
  return new Promise(resolve => {
    _confirmResolve = resolve;
    confirmTitle.textContent = title;
    confirmDesc.innerHTML    = desc;
    confirmInput.value       = '';
    confirmOk.disabled       = true;
    confirmOverlay.classList.add('visible');
    confirmInput.focus();
  });
}

confirmInput.addEventListener('input', () => {
  confirmOk.disabled = confirmInput.value.trim().toLowerCase() !== 'confirm';
});

confirmInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !confirmOk.disabled) { _confirmResolve(true); _closeConfirm(); }
  if (e.key === 'Escape') { _confirmResolve(false); _closeConfirm(); }
});

confirmOk.addEventListener('click', () => { _confirmResolve(true);  _closeConfirm(); });
confirmCancel.addEventListener('click', () => { _confirmResolve(false); _closeConfirm(); });

function _closeConfirm() {
  confirmOverlay.classList.remove('visible');
  _confirmResolve = null;
}

// ─── Clear loads ──────────────────────────────────────────────────────────────
document.getElementById('btn-clear-loads').addEventListener('click', async () => {
  const ok = await _showConfirm(
    'Clear all loads',
    'This will remove every container from storage.<br>Type <strong>confirm</strong> to proceed.'
  );
  if (!ok) return;
  await fetch('/v1/containers', { method: 'DELETE' });
  await loadSnapshot();
});

// ─── Clear locations ──────────────────────────────────────────────────────────
document.getElementById('btn-clear-locs').addEventListener('click', async () => {
  const ok = await _showConfirm(
    'Clear all locations',
    'This will remove <strong>all locations and containers</strong> from storage.<br>Type <strong>confirm</strong> to proceed.'
  );
  if (!ok) return;
  await fetch('/v1/locations', { method: 'DELETE' });
  locations.clear();
  containers.clear();
  wireframeIndices.clear();
  hoverIndices.clear();
  groupBoxCache.clear();
  reservedContainerIds.clear();
  reservedLocationIds.clear();
  hoveredAisleKey = null;
  hoveredLocId    = null;
  forceRender();
  await loadSnapshot();
});
</script>
