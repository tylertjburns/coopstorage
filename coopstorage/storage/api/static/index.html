<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CoopStorage Visualizer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d1117; color: #c9d1d9; font-family: monospace; overflow: hidden; }

    #canvas { display: block; cursor: grab; }
    #canvas.dragging { cursor: grabbing; }

    #hud {
      position: fixed; top: 12px; left: 12px;
      display: flex; gap: 8px; align-items: center; pointer-events: all;
    }
    .btn {
      background: #21262d; border: 1px solid #30363d; color: #c9d1d9;
      padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 12px;
      font-family: monospace; transition: background 0.1s;
    }
    .btn:hover { background: #30363d; }
    .btn.active { background: #1f6feb; border-color: #388bfd; }

    #hint { font-size: 11px; color: #484f58; margin-left: 6px; }

    .btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-danger  { border-color: #f85149; color: #f85149; }
    .btn-danger:hover:not(:disabled) { background: #3d1a1a; }
    .btn-sim     { border-color: #3fb950; color: #3fb950; }
    .btn-sim:hover:not(:disabled) { background: #0f2e0f; }
    .btn-stop    { border-color: #d29922; color: #d29922; }
    .btn-stop:hover:not(:disabled) { background: #2e1f00; }

    #confirm-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.6); z-index: 100;
      align-items: center; justify-content: center;
    }
    #confirm-overlay.visible { display: flex; }
    #confirm-box {
      background: #161b22; border: 1px solid #30363d; border-radius: 8px;
      padding: 24px 28px; min-width: 320px; font-family: monospace;
    }
    #confirm-box h3 { color: #e6edf3; margin-bottom: 10px; font-size: 13px; }
    #confirm-box p  { color: #8b949e; font-size: 11px; margin-bottom: 14px; line-height: 1.6; }
    #confirm-input {
      width: 100%; background: #0d1117; border: 1px solid #30363d;
      color: #c9d1d9; border-radius: 4px; padding: 6px 10px;
      font-family: monospace; font-size: 12px; margin-bottom: 14px;
    }
    #confirm-input:focus { outline: none; border-color: #58a6ff; }
    #confirm-buttons { display: flex; gap: 8px; justify-content: flex-end; }
    #sim-status { font-size: 11px; color: #8b949e; margin-left: 4px; }

    #status {
      position: fixed; bottom: 12px; left: 12px;
      font-size: 11px; color: #8b949e;
    }

    #tooltip {
      position: fixed; display: none;
      background: #161b22; border: 1px solid #30363d; border-radius: 6px;
      padding: 10px 14px; font-size: 11px; pointer-events: none;
      max-width: 300px; line-height: 1.7; z-index: 10;
    }
    #tooltip strong { color: #e6edf3; }
    #tooltip em { color: #58a6ff; font-style: normal; }

    #legend {
      position: fixed; bottom: 12px; right: 12px;
      background: #161b22; border: 1px solid #30363d; border-radius: 6px;
      padding: 8px 12px; font-size: 11px; line-height: 2; pointer-events: none;
    }
    .legend-row { display: flex; align-items: center; gap: 8px; }
    .legend-swatch {
      width: 14px; height: 14px; border-radius: 2px; flex-shrink: 0;
    }

    #uom-legend {
      position: fixed; bottom: 12px; right: 180px;
      background: #161b22; border: 1px solid #30363d; border-radius: 6px;
      padding: 8px 12px; font-size: 11px; line-height: 2; pointer-events: none;
      display: none;
    }
    #uom-legend-title { color: #8b949e; margin-bottom: 2px; font-size: 10px; }
    .uom-legend-row { display: flex; align-items: center; gap: 6px; }
    .uom-icon { font-size: 13px; width: 18px; text-align: center; }
  </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="hud">
  <button class="btn active" id="btn-iso">Isometric</button>
  <button class="btn"        id="btn-2d">Top-down</button>
  <button class="btn"        id="btn-fit">Fit view</button>
  <span style="width:1px;background:#30363d;height:20px;display:inline-block;margin:0 4px;"></span>
  <button class="btn btn-sim"  id="btn-sim-start">▶ Start Sim</button>
  <button class="btn btn-stop" id="btn-sim-stop" disabled>■ Stop Sim</button>
  <span id="sim-status"></span>
  <span style="width:1px;background:#30363d;height:20px;display:inline-block;margin:0 4px;"></span>
  <button class="btn btn-danger" id="btn-clear-loads">Clear Loads</button>
  <button class="btn btn-danger" id="btn-clear-locs">Clear Locations</button>
  <span id="hint">Scroll to zoom · Drag to pan</span>
</div>

<div id="confirm-overlay">
  <div id="confirm-box">
    <h3 id="confirm-title">Confirm action</h3>
    <p id="confirm-desc">Type <strong>confirm</strong> to proceed.</p>
    <input id="confirm-input" type="text" placeholder="confirm" autocomplete="off" />
    <div id="confirm-buttons">
      <button class="btn" id="confirm-cancel">Cancel</button>
      <button class="btn btn-danger" id="confirm-ok" disabled>Confirm</button>
    </div>
  </div>
</div>

<div id="status">Connecting…</div>
<div id="tooltip"></div>
<div id="uom-legend"><div id="uom-legend-title">UOM</div></div>

<div id="legend">
  <div class="legend-row">
    <div class="legend-swatch" style="background:#1a4a1a; border:1px solid #3fb950;"></div>
    <span>Occupied</span>
  </div>
  <div class="legend-row">
    <div class="legend-swatch" style="background:#1c2128; border:1px solid #444c56;"></div>
    <span>Available</span>
  </div>
  <div class="legend-row">
    <div class="legend-swatch" style="background:#1c2128; border:2px solid #58a6ff;"></div>
    <span>Droppable</span>
  </div>
  <div class="legend-row">
    <div class="legend-swatch" style="background:#1a4a1a; border:2px solid #bc8cff;"></div>
    <span>Retrievable</span>
  </div>
</div>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
// locations: id → { id, coords:[x,y,z], meta:{dims,channel_processor,capacity,...},
//                   slots:[id|null,...], containers:{id→{id,uom,contents}},
//                   tree_path:{zone,aisle,...} }
const locations  = new Map();
const containers = new Map();   // flat container registry

// ─── Aisle index ──────────────────────────────────────────────────────────────
// aisleKey(loc) → string used as the aisle identity (zone+aisle)
// aisleIndex: aisleKey → Set of loc_ids
// aisleBoxCache: aisleKey → { minX, minY, maxX, maxY } in world coords (cached)
const aisleIndex    = new Map();
const aisleBoxCache = new Map();
let   hoveredAisleKey = null;

function _aisleKey(loc) {
  const tp = loc.tree_path;
  if (!tp || tp.zone === undefined || tp.aisle === undefined) return null;
  return `z${tp.zone}_a${tp.aisle}`;
}

function _indexLoc(loc) {
  const key = _aisleKey(loc);
  if (!key) return;
  if (!aisleIndex.has(key)) aisleIndex.set(key, new Set());
  aisleIndex.get(key).add(loc.id);
  aisleBoxCache.delete(key);  // invalidate cached box
}

function _aisleBox(key) {
  if (aisleBoxCache.has(key)) return aisleBoxCache.get(key);
  const ids = aisleIndex.get(key);
  if (!ids) return null;
  let minX = Infinity, minY = Infinity, minZ = Infinity;
  let maxX = -Infinity, maxY = -Infinity, maxZ = -Infinity;
  for (const id of ids) {
    const loc = locations.get(id);
    if (!loc) continue;
    const [wx, wy, wz] = loc.coords;
    const [dx, dy, dz] = loc.meta.dims;
    minX = Math.min(minX, wx);      maxX = Math.max(maxX, wx + dx);
    minY = Math.min(minY, wy);      maxY = Math.max(maxY, wy + dy);
    minZ = Math.min(minZ, wz);      maxZ = Math.max(maxZ, wz + dz);
  }
  const box = { minX, minY, minZ, maxX, maxY, maxZ };
  aisleBoxCache.set(key, box);
  return box;
}

function _aisleOccupancyPct(key) {
  const ids = aisleIndex.get(key);
  if (!ids) return 0;
  let used = 0, cap = 0;
  for (const id of ids) {
    const loc = locations.get(id);
    if (!loc) continue;
    cap  += loc.slots.length;
    used += loc.slots.filter(s => s !== null).length;
  }
  return cap > 0 ? used / cap : 0;
}

function _drawAisleWireframe(key) {
  const box = _aisleBox(key);
  if (!box) return;
  const pct = _aisleOccupancyPct(key);
  // Interpolate between empty (#444c56) and occupied (#3fb950) to match slot colors
  const r = Math.round(0x44 + pct * (0x3f - 0x44));
  const g = Math.round(0x4c + pct * (0xb9 - 0x4c));
  const b = Math.round(0x56 + pct * (0x50 - 0x56));
  const stroke = `rgb(${r},${g},${b})`;

  if (isIso) {
    const p = (x, y, z) => project(x, y, z);
    const { minX: x0, minY: y0, minZ: z0, maxX: x1, maxY: y1, maxZ: z1 } = box;
    // Draw three visible wireframe edges (left, right, top faces) of the bounding cube
    const edges = [
      // bottom rect
      [p(x0,y0,z0), p(x1,y0,z0)], [p(x1,y0,z0), p(x1,y1,z0)],
      [p(x1,y1,z0), p(x0,y1,z0)], [p(x0,y1,z0), p(x0,y0,z0)],
      // top rect
      [p(x0,y0,z1), p(x1,y0,z1)], [p(x1,y0,z1), p(x1,y1,z1)],
      [p(x1,y1,z1), p(x0,y1,z1)], [p(x0,y1,z1), p(x0,y0,z1)],
      // verticals
      [p(x0,y0,z0), p(x0,y0,z1)], [p(x1,y0,z0), p(x1,y0,z1)],
      [p(x1,y1,z0), p(x1,y1,z1)], [p(x0,y1,z0), p(x0,y1,z1)],
    ];
    ctx.strokeStyle = stroke;
    ctx.lineWidth   = 1;
    for (const [a, b] of edges) {
      ctx.beginPath();
      ctx.moveTo(a[0], a[1]);
      ctx.lineTo(b[0], b[1]);
      ctx.stroke();
    }
  } else {
    const [sx0, sy0] = project(box.minX, box.minY, 0);
    const [sx1, sy1] = project(box.maxX, box.maxY, 0);
    ctx.strokeStyle = stroke;
    ctx.lineWidth   = 1;
    ctx.strokeRect(sx0, sy0, sx1 - sx0, sy1 - sy0);
  }

  // Label
  const [lx, ly] = isIso
    ? project((box.minX + box.maxX) / 2, box.minY, box.maxZ)
    : project((box.minX + box.maxX) / 2, (box.minY + box.maxY) / 2, 0);
  const ids = aisleIndex.get(key);
  const sample = ids ? locations.get([...ids][0]) : null;
  if (sample && sample.tree_path) {
    const tp = sample.tree_path;
    ctx.fillStyle    = stroke;
    ctx.font         = '11px monospace';
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillText(`Z${tp.zone} A${tp.aisle}`, lx, ly);
  }
}

// ─── UOM icon system ──────────────────────────────────────────────────────────
// Pool of distinct unicode symbols assigned deterministically per UOM name.
const UOM_ICON_POOL = ['■','▲','●','◆','★','▼','⬟','⬡','⬢','⬣','⬤','⬥','⬦',
                       '⬧','⬨','⬩','⬪','⬫','⬬','⬭','⬮','⬯'];
const uomIconMap = new Map();   // uom name → icon string

function _uomIcon(uomName) {
  if (!uomIconMap.has(uomName)) {
    const icon = UOM_ICON_POOL[uomIconMap.size % UOM_ICON_POOL.length];
    uomIconMap.set(uomName, icon);
    _refreshUomLegend();
  }
  return uomIconMap.get(uomName);
}

function _refreshUomLegend() {
  const el = document.getElementById('uom-legend');
  if (uomIconMap.size === 0) { el.style.display = 'none'; return; }
  el.style.display = 'block';
  // Rebuild rows after title
  const title = document.getElementById('uom-legend-title');
  el.innerHTML = '';
  el.appendChild(title);
  for (const [name, icon] of uomIconMap) {
    const row = document.createElement('div');
    row.className = 'uom-legend-row';
    row.innerHTML = `<span class="uom-icon">${icon}</span><span>${name}</span>`;
    el.appendChild(row);
  }
}

// ─── Tile cache ───────────────────────────────────────────────────────────────
// Each location's 3D detail is rendered once into an OffscreenCanvas and blitted
// each frame. A tile is invalidated when slot state, addable/removable positions,
// or the view mode changes. During zoom gestures we skip the cache entirely to
// avoid rebuilding stale tiles on every frame.
const TILE_CACHE_MAX = 500;
const tileCache = new Map();  // loc.id → { key, canvas, relOx, relOy }  (LRU — capped at TILE_CACHE_MAX)

function _tileCacheSet(id, tile) {
  if (tileCache.has(id)) tileCache.delete(id);       // refresh insertion order
  tileCache.set(id, tile);
  if (tileCache.size > TILE_CACHE_MAX) {
    tileCache.delete(tileCache.keys().next().value);  // evict oldest
  }
}

function _tileCacheGet(id) {
  if (!tileCache.has(id)) return undefined;
  const tile = tileCache.get(id);
  tileCache.delete(id); tileCache.set(id, tile);     // refresh insertion order
  return tile;
}
let   zooming   = false;
let   panning   = false;
let   _zoomTimer = null;
let   _panTimer  = null;

function _locStateKey(loc) {
  // Encodes only content state — slot occupancy, channel access, and view mode.
  // Scale is intentionally excluded: tileCache.clear() on zoom settle handles
  // scale invalidation, so including it here would cause pre-warmed tiles to
  // always miss when the user zooms in from fit-view scale.
  const slots = loc.slots.join(',');
  const add   = (loc.addable_slots   || []).join(',');
  const rem   = (loc.removable_slots || []).join(',');
  const view  = isIso ? 'i' : '2';
  return `${view}|${slots}|${add}|${rem}`;
}

// Build an OffscreenCanvas for loc, render the detail onto it.
// Offsets are stored relative to the location's own projected screen position
// so that panning (which shifts all projected points equally) never invalidates tiles.
function _buildTile(loc) {
  const [wx, wy, wz] = loc.coords;
  const [dx, dy, dz] = loc.meta.dims;

  // Project with pan=0 so offsets are pan-independent.
  const savedPanX = panX, savedPanY = panY;
  panX = 0; panY = 0;

  const corners = [
    [wx,    wy,    wz],    [wx+dx, wy,    wz],
    [wx,    wy+dy, wz],    [wx+dx, wy+dy, wz],
    [wx,    wy,    wz+dz], [wx+dx, wy,    wz+dz],
    [wx,    wy+dy, wz+dz], [wx+dx, wy+dy, wz+dz],
  ];
  const spts = corners.map(c => project(...c));
  const margin = Math.max(60, scale * 4);
  const minSx = Math.min(...spts.map(p => p[0])) - margin;
  const minSy = Math.min(...spts.map(p => p[1])) - margin;
  const maxSx = Math.max(...spts.map(p => p[0])) + margin;
  const maxSy = Math.max(...spts.map(p => p[1])) + margin;

  // Anchor: location centre in pan=0 space
  const [ancX, ancY] = project(...loc.coords);
  // relO* = offset from projected centre to tile top-left (pan-independent)
  const relOx = minSx - ancX;
  const relOy = minSy - ancY;

  panX = savedPanX; panY = savedPanY;

  const tw = Math.ceil(maxSx - minSx);
  const th = Math.ceil(maxSy - minSy);
  if (tw <= 0 || th <= 0) return null;

  const osc  = new OffscreenCanvas(tw, th);
  const octx = osc.getContext('2d');

  // Redirect draw calls to offscreen canvas, shift origin to tile top-left.
  const savedCtx = ctx;
  ctx  = octx;   // eslint-disable-line no-global-assign
  panX = -minSx;
  panY = -minSy;

  _drawDetail3D(loc);

  panX = savedPanX;
  panY = savedPanY;
  ctx  = savedCtx;  // eslint-disable-line no-global-assign

  return { key: _locStateKey(loc), canvas: osc, relOx, relOy };
}

function _getTile(loc) {
  const key = _locStateKey(loc);
  const cached = _tileCacheGet(loc.id);
  if (cached && cached.key === key) return cached;
  const tile = _buildTile(loc);
  if (tile) _tileCacheSet(loc.id, tile);
  return tile;
}

function _onZoom() {
  zooming = true;
  clearTimeout(_zoomTimer);
  _zoomTimer = setTimeout(() => {
    zooming = false;
    tileCache.clear();   // force rebuild at new scale
    requestRender();
    // Pre-warm tiles at the new scale so subsequent hovers are instant
    if (scale >= LOD_DETAIL) _prewarmTiles([...locations.values()]);
  }, 50);
}

// ─── Canvas setup ─────────────────────────────────────────────────────────────
const canvas  = document.getElementById('canvas');
let   ctx     = canvas.getContext('2d');
const statusEl  = document.getElementById('status');
const tooltipEl = document.getElementById('tooltip');
let W = 0, H = 0;
let renderQueued    = false;
let _renderThrottle = null;
const RENDER_THROTTLE_MS = 25;

// ─── Event queue — drain once per render, not once per SSE message ────────────
const _eventQueue = [];
let   _drainQueued = false;

function _queueEvent(msg) {
  _eventQueue.push(msg);
  if (!_drainQueued) {
    _drainQueued = true;
    requestAnimationFrame(() => {
      _drainQueued = false;
      const batch = _eventQueue.splice(0);
      for (const m of batch) applyEvent(m);
    });
  }
}

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  requestRender();
}
window.addEventListener('resize', resize);
resize();

// ─── Viewport ─────────────────────────────────────────────────────────────────
let panX = W / 2, panY = H / 2, scale = 1;
let isIso = true;

// Project a world point to canvas pixels.
function project(wx, wy, wz) {
  let rx, ry;
  if (isIso) {
    rx = (wx - wy) * 0.866;
    ry = (wx + wy) * 0.5 - wz;
  } else {
    rx = wx;
    ry = wy;
  }
  return [rx * scale + panX, ry * scale + panY];
}

// Project all locations without pan/scale (for bounding box fitting).
function projectRaw(wx, wy, wz) {
  if (isIso) return [(wx - wy) * 0.866, (wx + wy) * 0.5 - wz];
  return [wx, wy];
}

function fitView() {
  if (locations.size === 0) return;
  const pts = [];
  for (const loc of locations.values()) {
    pts.push(projectRaw(...loc.coords));
  }
  const xs = pts.map(p => p[0]), ys = pts.map(p => p[1]);
  const minX = Math.min(...xs), maxX = Math.max(...xs);
  const minY = Math.min(...ys), maxY = Math.max(...ys);
  const bw = maxX - minX || 1, bh = maxY - minY || 1;
  const pad = 80;
  scale = Math.min((W - pad * 2) / bw, (H - pad * 2) / bh, 200);
  scale = Math.max(scale, 0.01);
  panX  = W / 2 - ((minX + maxX) / 2) * scale;
  panY  = H / 2 - ((minY + maxY) / 2) * scale;
  requestRender();
}

// ─── LOD thresholds (pixels per world unit) ───────────────────────────────────
// < LOD_DETAIL → dot
// >= LOD_DETAIL → slot detail
const LOD_DETAIL = 3;

// ─── Rendering ────────────────────────────────────────────────────────────────
function requestRender() {
  if (_renderThrottle) return;
  _renderThrottle = setTimeout(() => {
    _renderThrottle = null;
    if (!renderQueued) {
      renderQueued = true;
      requestAnimationFrame(() => { renderQueued = false; render(); });
    }
  }, RENDER_THROTTLE_MS);
}

function render() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#0d1117';
  ctx.fillRect(0, 0, W, H);

  const useDots = scale < LOD_DETAIL;
  const r = Math.max(1.5, scale * 0.6);

  // During zoom: only wireframes, zero per-loc work
  if (zooming || panning) {
    for (const key of aisleIndex.keys()) _drawAisleWireframe(key);
    return;
  }

  // Dot batching: collect positions in two arrays, draw in two path calls.
  const dotsEmpty    = [];
  const dotsOccupied = [];

  // At dot-zoom: draw non-hovered aisles as wireframes, then skip their locs.
  if (useDots && aisleIndex.size > 0) {
    for (const key of aisleIndex.keys()) {
      if (key === hoveredAisleKey) continue;
      _drawAisleWireframe(key);
    }
  }

  for (const loc of locations.values()) {
    const [sx, sy] = project(...loc.coords);

    // Viewport cull with generous margin
    if (sx < -300 || sx > W + 300 || sy < -300 || sy > H + 300) continue;

    const locAisleKey = _aisleKey(loc);
    const isHoveredAisle = locAisleKey !== null && locAisleKey === hoveredAisleKey;

    const occupied = loc.slots.some(s => s !== null);

    if (useDots) {
      // At dot-zoom: only render individual locs for the hovered aisle
      if (!isHoveredAisle && locAisleKey !== null) continue;
      if (occupied) dotsOccupied.push(sx, sy);
      else          dotsEmpty.push(sx, sy);
    } else if (isHoveredAisle) {
      // Detail zoom, hovered aisle: full tile/detail rendering
      if (!loc.slot_dims) {
        drawDetail(loc, sx, sy);
      } else {
        const tile = _getTile(loc);
        if (tile) {
          ctx.drawImage(tile.canvas, sx + tile.relOx, sy + tile.relOy);
        } else {
          drawDetail(loc, sx, sy);
        }
      }
    } else {
      // Detail zoom, non-hovered: dots
      if (occupied) dotsOccupied.push(sx, sy);
      else          dotsEmpty.push(sx, sy);
    }
  }

  // Flush dot batches
  // rect() is significantly cheaper than arc() for large batches
  const d = r * 2;
  if (dotsEmpty.length > 0) {
    ctx.beginPath();
    for (let i = 0; i < dotsEmpty.length; i += 2)
      ctx.rect(dotsEmpty[i] - r, dotsEmpty[i+1] - r, d, d);
    ctx.fillStyle = '#21262d';
    ctx.fill();
  }
  if (dotsOccupied.length > 0) {
    ctx.beginPath();
    for (let i = 0; i < dotsOccupied.length; i += 2)
      ctx.rect(dotsOccupied[i] - r, dotsOccupied[i+1] - r, d, d);
    ctx.fillStyle = '#238636';
    ctx.fill();
  }
}

function drawRect(loc, sx, sy, occupied) {
  const factor = Math.min(scale / LOD_MID, 3);
  const w = 36 * factor, h = 20 * factor;
  const x0 = sx - w / 2, y0 = sy - h / 2;

  ctx.fillStyle   = occupied ? '#0d2a0d' : '#161b22';
  ctx.strokeStyle = occupied ? '#238636' : '#30363d';
  ctx.lineWidth   = 1;
  ctx.fillRect(x0, y0, w, h);
  ctx.strokeRect(x0, y0, w, h);

  if (scale > 5) {
    ctx.fillStyle    = '#e6edf3';
    ctx.font         = `${Math.min(14, w * 0.28)}px monospace`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(String(loc.id).slice(0, 10), sx, sy);
  }
}

// ─── 3-D geometry helpers ─────────────────────────────────────────────────────

// Fill a polygon defined by projected screen points, then stroke it.
function _face(pts, fill, stroke) {
  ctx.beginPath();
  ctx.moveTo(pts[0][0], pts[0][1]);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
  ctx.closePath();
  ctx.fillStyle = fill;   ctx.fill();
  ctx.strokeStyle = stroke; ctx.lineWidth = 0.5; ctx.stroke();
}

// Draw text on an isometric face, shrinking font size to fit maxWidth.
function _isoText(text, cx, cy, angle, maxWidth, maxSize, baseline, offsetY = 0) {
  ctx.font = `${maxSize}px monospace`;
  const measured = ctx.measureText(text).width;
  const size = measured > maxWidth ? maxSize * (maxWidth / measured) : maxSize;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angle);
  ctx.fillStyle = '#e6edf3';
  ctx.font = `${size}px monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = baseline;
  ctx.fillText(text, 0, offsetY);
  ctx.restore();
}

// Draw a polygon outline only (no fill).
function _outlinePolygon(pts, strokeColor, lineWidth = 1.5) {
  ctx.beginPath();
  ctx.moveTo(pts[0][0], pts[0][1]);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
  ctx.closePath();
  ctx.strokeStyle = strokeColor;
  ctx.lineWidth = lineWidth;
  ctx.stroke();
}

// Fill a polygon with alternating-color diagonal hatch lines, clipped to the shape.
function _crosshatchPolygon(pts, color1, color2, spacing = 5) {
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(pts[0][0], pts[0][1]);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
  ctx.closePath();
  ctx.clip();
  const xs = pts.map(p => p[0]), ys = pts.map(p => p[1]);
  const x0 = Math.min(...xs), x1 = Math.max(...xs);
  const y0 = Math.min(...ys), y1 = Math.max(...ys);
  const h = y1 - y0;
  ctx.lineWidth = 1;
  let toggle = false;
  for (let d = -(h); d < (x1 - x0) + h; d += spacing) {
    ctx.strokeStyle = toggle ? color2 : color1;
    ctx.beginPath();
    ctx.moveTo(x0 + d, y0);
    ctx.lineTo(x0 + d + h, y1);
    ctx.stroke();
    toggle = !toggle;
  }
  ctx.restore();
}

// Draw the three visible isometric faces of an axis-aligned box.
// (wx,wy,wz) is the min-corner; (dx,dy,dz) are the extents.
//
// With rx=(wx-wy)*0.866, ry=(wx+wy)*0.5-wz the three visible faces are:
//   left  (y+ side) — bottom-left  rhombus in screen space
//   right (x+ side) — bottom-right rhombus in screen space
//   top   (z+ side) — top diamond  in screen space
//
// y- is NOT a visible face: it projects onto the same screen area as x+ and
// z+, and drawing it last would overwrite them with the wrong colour.
// Draw order: left → right → top (back-to-front painter's algorithm).
function drawIsoCube(wx, wy, wz, dx, dy, dz,
                     topColor, rightColor, leftColor, strokeColor) {
  const p = (x, y, z) => project(x, y, z);
  // left face (y+ side — bottom-left in screen)
  _face([p(wx,    wy+dy, wz),    p(wx+dx, wy+dy, wz),
         p(wx+dx, wy+dy, wz+dz), p(wx,    wy+dy, wz+dz)],
        leftColor, strokeColor);
  // right face (x+ side — bottom-right in screen)
  _face([p(wx+dx, wy,    wz),    p(wx+dx, wy+dy, wz),
         p(wx+dx, wy+dy, wz+dz), p(wx+dx, wy,    wz+dz)],
        rightColor, strokeColor);
  // top face (z+ side — drawn last so it sits on top)
  _face([p(wx,    wy+dy, wz+dz), p(wx+dx, wy+dy, wz+dz),
         p(wx+dx, wy,    wz+dz), p(wx,    wy,    wz+dz)],
        topColor, strokeColor);
}

// Draw the XY footprint of a box (top-down 2-D view).
function drawTopBox(wx, wy, dx, dy, fill, stroke) {
  const [x0, y0] = project(wx,    wy,    0);
  const [x1, y1] = project(wx+dx, wy+dy, 0);
  ctx.fillStyle = fill; ctx.strokeStyle = stroke; ctx.lineWidth = 0.5;
  ctx.fillRect(x0, y0, x1-x0, y1-y0);
  ctx.strokeRect(x0, y0, x1-x0, y1-y0);
}

// ─── Detail renderer (LOD_CLOSE and above) ────────────────────────────────────

function drawDetail(loc, sx, sy) {
  // If location carries spatial geometry, render 3-D cubes.
  if (loc.slot_dims && loc.slot_offsets) {
    _drawDetail3D(loc);
  } else {
    _drawDetailCard(loc, sx, sy);
  }
}

function _drawDetail3D(loc) {
  const [wx, wy, wz] = loc.coords;
  const [dx, dy, dz] = loc.meta.dims;

  // Location bounding cube — subtle dark fill, grey outline
  if (isIso) {
    drawIsoCube(wx, wy, wz, dx, dy, dz,
      'rgba(26,31,38,0.8)', 'rgba(18,22,28,0.8)', 'rgba(18,22,28,0.8)', '#30363d');
  } else {
    drawTopBox(wx, wy, dx, dy, 'rgba(26,31,38,0.8)', '#30363d');
  }

  // Slot cubes
  const [sdx, sdy, sdz] = loc.slot_dims;
  for (let i = 0; i < loc.slots.length; i++) {
    const [ox, oy, oz] = loc.slot_offsets[i];
    const cid = loc.slots[i];
    const occ = cid !== null;

    const isAddable  = loc.addable_slots  && loc.addable_slots.includes(i);
    const isRemovable = loc.removable_slots && loc.removable_slots.includes(i);

    if (isIso) {
      const p = (x, y, z) => project(x, y, z);
      const sx2 = wx+ox, sy2 = wy+oy, sz2 = wz+oz;
      const topCol  = occ ? '#1a4a1a' : '#1c2128';
      const sideCol = occ ? '#0f2e0f' : '#141a1f';
      const stroke  = occ ? '#3fb950' : '#444c56';
      // y+ face: left wall (bottom-left in screen)
      _face([p(sx2,     sy2+sdy, sz2),     p(sx2+sdx, sy2+sdy, sz2),
             p(sx2+sdx, sy2+sdy, sz2+sdz), p(sx2,     sy2+sdy, sz2+sdz)],
            sideCol, stroke);
      // x+ face: right wall / divider between slots
      _face([p(sx2+sdx, sy2,     sz2),     p(sx2+sdx, sy2+sdy, sz2),
             p(sx2+sdx, sy2+sdy, sz2+sdz), p(sx2+sdx, sy2,     sz2+sdz)],
            sideCol, stroke);
      // z+ top face
      const topPts = [p(sx2,     sy2+sdy, sz2+sdz), p(sx2+sdx, sy2+sdy, sz2+sdz),
                      p(sx2+sdx, sy2,     sz2+sdz), p(sx2,     sy2,     sz2+sdz)];
      _face(topPts, topCol, stroke);
      // Channel-processor overlay on top face
      if (isAddable && isRemovable) {
        _crosshatchPolygon(topPts, '#58a6ff', '#bc8cff', 5);
        _outlinePolygon(topPts, '#58a6ff');
      } else if (isAddable) {
        _outlinePolygon(topPts, '#58a6ff');
      } else if (isRemovable) {
        _outlinePolygon(topPts, '#bc8cff');
      }
    } else {
      const [bx0, by0] = project(wx+ox,     wy+oy,     0);
      const [bx1, by1] = project(wx+ox+sdx, wy+oy+sdy, 0);
      drawTopBox(wx+ox, wy+oy, sdx, sdy,
        occ ? '#1a4a1a' : '#1c2128',
        occ ? '#3fb950' : '#444c56');
      if (isAddable || isRemovable) {
        const rectPts = [[bx0,by0],[bx1,by0],[bx1,by1],[bx0,by1]];
        if (isAddable && isRemovable) {
          _crosshatchPolygon(rectPts, '#58a6ff', '#bc8cff', 4);
          _outlinePolygon(rectPts, '#58a6ff');
        } else if (isAddable) {
          _outlinePolygon(rectPts, '#58a6ff');
        } else {
          _outlinePolygon(rectPts, '#bc8cff');
        }
      }
    }

    if (isIso && scale > 10) {
      const sx2 = wx+ox, sy2 = wy+oy, sz2 = wz+oz;
      // Channel index — top of y+ (left) face, +30° to follow world +x axis
      const [lix, liy] = project(sx2+sdx/2, sy2+sdy, sz2+sdz);
      _isoText(String(i), lix, liy, Math.PI/6, sdx * scale * 0.85, 11, 'top', 11/2);
      // Container name + UOM icon — center of z+ (top) face, -30° to follow world -y axis
      if (cid) {
        const c = loc.containers[cid] || containers.get(String(cid));
        const icon = c ? _uomIcon(c.uom) : '';
        const [tx, ty] = project(sx2+sdx/2, sy2+sdy/2, sz2+sdz);
        _isoText(icon + ' ' + String(cid), tx, ty, -Math.PI/6, sdy * scale * 0.85, 11, 'middle');
      }
    }
  }

  // Location ID — top of x+ (right) face of bounding cube, -30° to follow world -y axis
  if (scale > 10) {
    if (isIso) {
      const [lx, ly] = project(wx+dx, wy+dy/2, wz+dz);
      _isoText(String(loc.id), lx, ly, -Math.PI/6, dy * scale * 0.85, 12, 'top', 12/2);
    } else {
      const [lx, ly] = project(wx + dx/2, wy + dy/2, 0);
      _isoText(String(loc.id), lx, ly, 0, dx * scale * 0.85, 12, 'middle');
    }
  }
}

// Fallback: flat screen-space card (used when slot_dims/slot_offsets are absent)
function _drawDetailCard(loc, sx, sy) {
  const nSlots  = loc.slots.length;
  const slotW   = 20, slotH = 20, gap = 3;
  const padH    = 12, padV = 20;
  const totalW  = nSlots * (slotW + gap) - gap + padH * 2;
  const totalH  = slotH + padV * 2;
  const x0 = sx - totalW / 2, y0 = sy - totalH / 2;

  ctx.fillStyle   = '#161b22';
  ctx.strokeStyle = '#30363d';
  ctx.lineWidth   = 1;
  ctx.fillRect(x0, y0, totalW, totalH);
  ctx.strokeRect(x0, y0, totalW, totalH);

  if (scale > 10) {
    ctx.fillStyle    = '#e6edf3'; ctx.font = '12px monospace';
    ctx.textAlign    = 'left';   ctx.textBaseline = 'top';
    ctx.fillText(String(loc.id).slice(0, 14), x0 + 4, y0 + 3);
  }

  const used = loc.slots.filter(s => s !== null).length;
  ctx.fillStyle = '#e6edf3';
  ctx.textAlign = 'right'; ctx.textBaseline = 'bottom';
  ctx.fillText(`${used}/${nSlots}`, x0 + totalW - 4, y0 + totalH - 3);

  for (let i = 0; i < nSlots; i++) {
    const cid   = loc.slots[i];
    const slotX = x0 + padH + i * (slotW + gap);
    const slotY = y0 + padV;
    ctx.fillStyle   = cid ? '#0d2a0d' : '#0d1117';
    ctx.strokeStyle = cid ? '#238636' : '#30363d';
    ctx.lineWidth   = 1;
    ctx.fillRect(slotX, slotY, slotW, slotH);
    ctx.strokeRect(slotX, slotY, slotW, slotH);
    if (cid) {
      const c = loc.containers[cid];
      const icon = c ? _uomIcon(c.uom) : '';
      ctx.fillStyle = '#e6edf3'; ctx.font = '11px monospace';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(icon, slotX + slotW/2, slotY + slotH/2 - 4);
      ctx.font = '9px monospace';
      ctx.fillText(String(cid).slice(0, 4), slotX + slotW/2, slotY + slotH/2 + 5);
    }
  }
}

// ─── Interaction: pan & zoom ───────────────────────────────────────────────────
let dragging = false, lastMX = 0, lastMY = 0;

canvas.addEventListener('mousedown', e => {
  dragging = true;
  lastMX = e.clientX; lastMY = e.clientY;
  canvas.classList.add('dragging');
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  panX += e.clientX - lastMX;
  panY += e.clientY - lastMY;
  lastMX = e.clientX; lastMY = e.clientY;
  panning = true;
  clearTimeout(_panTimer);
  _panTimer = setTimeout(() => { panning = false; requestRender(); }, 50);
  requestRender();
});
window.addEventListener('mouseup', () => {
  dragging = false;
  canvas.classList.remove('dragging');
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY > 0 ? 0.88 : 1 / 0.88;
  panX = e.clientX - (e.clientX - panX) * factor;
  panY = e.clientY - (e.clientY - panY) * factor;
  scale *= factor;
  _onZoom();
  requestRender();
}, { passive: false });

// ─── Interaction: touch (pan + pinch-zoom) ────────────────────────────────────
let lastTouchX = 0, lastTouchY = 0, lastPinchDist = null;

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (e.touches.length === 1) {
    lastTouchX = e.touches[0].clientX;
    lastTouchY = e.touches[0].clientY;
    lastPinchDist = null;
  } else if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    lastPinchDist = Math.hypot(dx, dy);
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && lastPinchDist === null) {
    panX += e.touches[0].clientX - lastTouchX;
    panY += e.touches[0].clientY - lastTouchY;
    lastTouchX = e.touches[0].clientX;
    lastTouchY = e.touches[0].clientY;
    panning = true;
    clearTimeout(_panTimer);
    _panTimer = setTimeout(() => { panning = false; requestRender(); }, 50);
    requestRender();
  } else if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.hypot(dx, dy);
    if (lastPinchDist !== null) {
      const factor = dist / lastPinchDist;
      const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
      panX = cx - (cx - panX) * factor;
      panY = cy - (cy - panY) * factor;
      scale *= factor;
      _onZoom();
      requestRender();
    }
    lastPinchDist = dist;
  }
}, { passive: false });

canvas.addEventListener('touchend', e => {
  if (e.touches.length < 2) lastPinchDist = null;
}, { passive: false });

// ─── Interaction: tooltip on hover ────────────────────────────────────────────
let _aisleDebounceTimer = null;
let _pendingAisleKey    = null;

function _prewarmAisle(key) {
  // Build tiles for every loc in this aisle synchronously during the debounce
  // window — so the render frame after commit is pure blits, no build cost.
  if (!key || scale < LOD_DETAIL) return;
  const ids = aisleIndex.get(key);
  if (!ids) return;
  for (const id of ids) {
    const loc = locations.get(id);
    if (loc && loc.slot_dims) _getTile(loc);
  }
}

function _commitAisleKey(key) {
  if (key !== hoveredAisleKey) {
    hoveredAisleKey = key;
    requestRender();
  }
}

canvas.addEventListener('mousemove', e => {
  if (dragging) { tooltipEl.style.display = 'none'; return; }
  const hit = hitTest(e.clientX, e.clientY);
  if (!hit) {
    tooltipEl.style.display = 'none';
    clearTimeout(_aisleDebounceTimer);
    _pendingAisleKey = null;
    if (hoveredAisleKey !== null) { hoveredAisleKey = null; requestRender(); }
    return;
  }
  const newKey = _aisleKey(hit);
  if (newKey !== hoveredAisleKey && newKey !== _pendingAisleKey) {
    _pendingAisleKey = newKey;
    clearTimeout(_aisleDebounceTimer);
    // Pre-build tiles off the mouse-event thread so we don't block paint,
    // but still finish well before the 25ms debounce fires.
    setTimeout(() => _prewarmAisle(newKey), 0);
    _aisleDebounceTimer = setTimeout(() => _commitAisleKey(newKey), 25);
  }

  const used = hit.slots.filter(s => s !== null).length;
  let html = `<strong>${hit.id}</strong><br>`;
  html += `<em>coords</em> [${hit.coords.map(v => v.toFixed(1)).join(', ')}]<br>`;
  html += `<em>processor</em> ${hit.meta.channel_processor}<br>`;
  html += `<em>capacity</em> ${used} / ${hit.slots.length}<br>`;

  const cEntries = Object.entries(hit.containers);
  if (cEntries.length > 0) {
    html += `<br><em>containers</em><br>`;
    for (const [cid, c] of cEntries) {
      const label = c.contents.length > 0
        ? c.contents.map(cc => `${cc.qty}×${cc.uom} ${cc.resource}`).join(', ')
        : '(empty)';
      html += `&nbsp;${String(cid).slice(0, 10)}… ${label}<br>`;
    }
  }

  tooltipEl.innerHTML = html;
  tooltipEl.style.display = 'block';
  tooltipEl.style.left = (e.clientX + 14) + 'px';
  tooltipEl.style.top  = (e.clientY + 14) + 'px';
});
canvas.addEventListener('mouseleave', () => {
  tooltipEl.style.display = 'none';
  if (hoveredAisleKey !== null) { hoveredAisleKey = null; requestRender(); }
});

function hitTest(mx, my) {
  const threshold = scale < LOD_DETAIL ? 8 : 60;
  let hit = null;
  for (const loc of locations.values()) {
    const [sx, sy] = project(...loc.coords);
    if (Math.abs(mx - sx) < threshold && Math.abs(my - sy) < threshold) hit = loc;
  }
  return hit;
}

// ─── View toggle ──────────────────────────────────────────────────────────────
document.getElementById('btn-iso').addEventListener('click', () => {
  isIso = true;
  tileCache.clear();
  document.getElementById('btn-iso').classList.add('active');
  document.getElementById('btn-2d').classList.remove('active');
  fitView();
});
document.getElementById('btn-2d').addEventListener('click', () => {
  isIso = false;
  tileCache.clear();
  document.getElementById('btn-2d').classList.add('active');
  document.getElementById('btn-iso').classList.remove('active');
  fitView();
});
document.getElementById('btn-fit').addEventListener('click', fitView);

// ─── SSE event application ────────────────────────────────────────────────────
function applyEvent(msg) {
  const { type, payload } = msg;
  switch (type) {
    case 'location_registered': {
      locations.set(payload.id, payload);
      _indexLoc(payload);
      for (const [cid, c] of Object.entries(payload.containers || {})) {
        containers.set(cid, c);
      }
      break;
    }
    case 'container_registered': {
      containers.set(payload.id, payload);
      if (payload.uom) _uomIcon(payload.uom);
      break;
    }
    case 'container_moved': {
      const { container_id, container_uom, from_loc_id, to_loc_id,
              from_slots, to_slots,
              from_addable_slots, from_removable_slots,
              to_addable_slots,   to_removable_slots } = payload;
      if (container_uom) {
        _uomIcon(container_uom);
        if (!containers.has(container_id)) {
          containers.set(container_id, { id: container_id, uom: container_uom, contents: [] });
        }
      }
      if (from_loc_id && locations.has(from_loc_id)) {
        const loc = locations.get(from_loc_id);
        loc.slots = from_slots;
        if (from_addable_slots  !== undefined) loc.addable_slots  = from_addable_slots;
        if (from_removable_slots !== undefined) loc.removable_slots = from_removable_slots;
        delete loc.containers[container_id];
        tileCache.delete(from_loc_id);
      }
      if (to_loc_id && locations.has(to_loc_id)) {
        const loc = locations.get(to_loc_id);
        loc.slots = to_slots;
        if (to_addable_slots  !== undefined) loc.addable_slots  = to_addable_slots;
        if (to_removable_slots !== undefined) loc.removable_slots = to_removable_slots;
        const c = containers.get(container_id);
        if (c) loc.containers[container_id] = c;
        tileCache.delete(to_loc_id);
      } else if (!to_loc_id) {
        // delete_container_on_transfer — container is gone, clean up global map
        containers.delete(container_id);
      }
      break;
    }
    case 'content_changed': {
      const { container_id, loc_id, contents } = payload;
      if (containers.has(container_id)) {
        containers.get(container_id).contents = contents;
      }
      if (loc_id && locations.has(loc_id)) {
        const c = locations.get(loc_id).containers[container_id];
        if (c) c.contents = contents;
        tileCache.delete(loc_id);
      }
      break;
    }
    case 'container_removed': {
      const cid = payload.id;
      containers.delete(cid);
      // Use loc_id from payload when available (O(1)); fall back to scan only if absent.
      if (payload.loc_id && locations.has(payload.loc_id)) {
        delete locations.get(payload.loc_id).containers[cid];
        tileCache.delete(payload.loc_id);
      } else {
        for (const loc of locations.values()) {
          if (cid in loc.containers) { delete loc.containers[cid]; tileCache.delete(loc.id); break; }
        }
      }
      break;
    }
  }
  requestRender();
}

// ─── Data loading & SSE connection ────────────────────────────────────────────
const SNAPSHOT_PAGE = 1000;

async function loadSnapshot() {
  let offset = 0;
  let total  = null;

  statusEl.textContent = 'Loading snapshot…';

  do {
    const res = await fetch(`/v1/snapshot?offset=${offset}&limit=${SNAPSHOT_PAGE}`);
    if (!res.ok) throw new Error(`Snapshot HTTP ${res.status}`);
    const data = await res.json();
    total = data.total;

    for (const [id, loc] of Object.entries(data.locations)) {
      locations.set(id, loc);
      _indexLoc(loc);
      for (const [cid, c] of Object.entries(loc.containers)) {
        containers.set(cid, c);
        if (c.uom) _uomIcon(c.uom);
      }
    }

    offset += SNAPSHOT_PAGE;
    statusEl.textContent = `Loading… ${locations.size.toLocaleString()} / ${total.toLocaleString()}`;
    requestRender();

    // Yield to the browser for a full frame between pages
    await new Promise(r => requestAnimationFrame(r));

  } while (offset < total);

  statusEl.textContent = `${locations.size.toLocaleString()} locations loaded`;
  fitView();
  _prewarmTiles([...locations.values()]);
}

let _prewarmGeneration = 0;  // incremented to cancel in-flight prewarms

function _prewarmTiles(locs, i = 0, gen = null) {
  if (!('requestIdleCallback' in window)) return;  // Safari fallback: skip
  if (gen === null) gen = ++_prewarmGeneration;    // new caller starts a new generation
  requestIdleCallback(deadline => {
    if (gen !== _prewarmGeneration) return;        // cancelled by a newer prewarm
    while (i < locs.length && deadline.timeRemaining() > 2) {
      const loc = locs[i++];
      if (loc.slot_dims) _getTile(loc);
    }
    if (i < locs.length) _prewarmTiles(locs, i, gen);
  });
}

function connectSSE(subscriberId) {
  const es = new EventSource(`/v1/events/${subscriberId}`);

  es.addEventListener('message', e => {
    _queueEvent(JSON.parse(e.data));
    statusEl.textContent = `${locations.size} locations · live`;
  });

  es.addEventListener('open', () => {
    statusEl.textContent = `${locations.size} locations · live`;
  });

  es.addEventListener('error', () => {
    // Close current stream and re-run full boot sequence.
    // Handles server restarts, subscriber eviction, and transient errors.
    es.close();
    statusEl.textContent = 'Disconnected — reconnecting…';
    setTimeout(boot, 2000);
  });
}

async function boot() {
  const MAX_ATTEMPTS = 30;
  const RETRY_BASE_MS = 500;

  for (let attempt = 1; attempt <= MAX_ATTEMPTS; attempt++) {
    try {
      statusEl.textContent = attempt === 1
        ? 'Connecting…'
        : `Server not ready — retrying… (${attempt}/${MAX_ATTEMPTS})`;

      // 1. Obtain subscriber_id before loading snapshot so no events are missed
      const subRes = await fetch('/v1/subscribe', { method: 'POST' });
      if (!subRes.ok) throw new Error(`Subscribe HTTP ${subRes.status}`);
      const { subscriber_id } = await subRes.json();

      // 2. Load current state
      await loadSnapshot();

      // 3. Open live stream — buffered events from step 1→2 window arrive first
      connectSSE(subscriber_id);

      // 4. Clean up on page unload
      window.addEventListener('beforeunload', () => {
        navigator.sendBeacon(`/unsubscribe/${subscriber_id}`);
      });

      return;  // success — exit retry loop

    } catch (err) {
      if (attempt >= MAX_ATTEMPTS) {
        statusEl.textContent = `Could not connect after ${MAX_ATTEMPTS} attempts: ${err.message}`;
        console.error(err);
        return;
      }
      const delayMs = Math.min(RETRY_BASE_MS * attempt, 5000);
      statusEl.textContent = `Server not ready — retrying in ${(delayMs / 1000).toFixed(1)}s…`;
      await new Promise(r => setTimeout(r, delayMs));
    }
  }
}

boot();

// ─── Simulation controls ──────────────────────────────────────────────────────
const btnSimStart   = document.getElementById('btn-sim-start');
const btnSimStop    = document.getElementById('btn-sim-stop');
const simStatusEl   = document.getElementById('sim-status');

async function _pollSimStatus() {
  try {
    const res  = await fetch('/v1/simulate/status');
    if (!res.ok) return;
    const data = await res.json();
    btnSimStart.disabled = data.running;
    btnSimStop.disabled  = !data.running;
    simStatusEl.textContent = data.running
      ? `running · ${data.ops.toLocaleString()} ops · ${data.fill_pct}% full`
      : '';
  } catch (_) {}
}

btnSimStart.addEventListener('click', async () => {
  btnSimStart.disabled = true;
  try {
    await fetch('/v1/simulate/start', { method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mode: 'random' }) });
  } catch (_) {}
  _pollSimStatus();
});

btnSimStop.addEventListener('click', async () => {
  btnSimStop.disabled = true;
  try { await fetch('/v1/simulate/stop', { method: 'POST' }); } catch (_) {}
  _pollSimStatus();
});

setInterval(_pollSimStatus, 2000);
_pollSimStatus();

// ─── Confirm modal ────────────────────────────────────────────────────────────
const confirmOverlay = document.getElementById('confirm-overlay');
const confirmTitle   = document.getElementById('confirm-title');
const confirmDesc    = document.getElementById('confirm-desc');
const confirmInput   = document.getElementById('confirm-input');
const confirmOk      = document.getElementById('confirm-ok');
const confirmCancel  = document.getElementById('confirm-cancel');
let   _confirmResolve = null;

function _showConfirm(title, desc) {
  return new Promise(resolve => {
    _confirmResolve = resolve;
    confirmTitle.textContent = title;
    confirmDesc.innerHTML    = desc;
    confirmInput.value       = '';
    confirmOk.disabled       = true;
    confirmOverlay.classList.add('visible');
    confirmInput.focus();
  });
}

confirmInput.addEventListener('input', () => {
  confirmOk.disabled = confirmInput.value.trim().toLowerCase() !== 'confirm';
});

confirmInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !confirmOk.disabled) { _confirmResolve(true); _closeConfirm(); }
  if (e.key === 'Escape') { _confirmResolve(false); _closeConfirm(); }
});

confirmOk.addEventListener('click', () => { _confirmResolve(true);  _closeConfirm(); });
confirmCancel.addEventListener('click', () => { _confirmResolve(false); _closeConfirm(); });

function _closeConfirm() {
  confirmOverlay.classList.remove('visible');
  _confirmResolve = null;
}

// ─── Clear loads ──────────────────────────────────────────────────────────────
document.getElementById('btn-clear-loads').addEventListener('click', async () => {
  const ok = await _showConfirm(
    'Clear all loads',
    'This will remove every container from storage.<br>Type <strong>confirm</strong> to proceed.'
  );
  if (!ok) return;
  await fetch('/v1/containers', { method: 'DELETE' });
  await loadSnapshot();
});

// ─── Clear locations ──────────────────────────────────────────────────────────
document.getElementById('btn-clear-locs').addEventListener('click', async () => {
  const ok = await _showConfirm(
    'Clear all locations',
    'This will remove <strong>all locations and containers</strong> from storage.<br>Type <strong>confirm</strong> to proceed.'
  );
  if (!ok) return;
  await fetch('/v1/locations', { method: 'DELETE' });
  locations.clear();
  containers.clear();
  aisleIndex.clear();
  aisleBoxCache.clear();
  hoveredAisleKey = null;
  requestRender();
  await loadSnapshot();
});
</script>
